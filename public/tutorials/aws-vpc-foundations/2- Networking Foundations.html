document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6044f742-7b21-411a-a5e3-528c61c4cf6d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ce6ce5c0-1388-46ed-aa25-a405872c5f0a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{background:#eef2fc;font-family:'Figtree',system-ui,sans-serif;color:#22243f;-webkit-font-smoothing:antialiased}\n  @keyframes floatA{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-22px) translateX(10px)}}\n  @keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#c7d0ea;border-radius:8px}\n<\u002Fstyle>\n<script src=\"1e9e9a71-b743-4dd3-a2c9-0f10e52c87f9\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;position:relative;overflow-x:hidden;display:flex;flex-direction:column;align-items:center\">\n\n  <div style=\"position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden\">\n    <div style=\"position:absolute;top:12%;left:6%;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff,#dbe6ff);opacity:.5;filter:blur(2px);animation:floatA 13s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;top:58%;left:80%;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff,#e7dcff);opacity:.45;filter:blur(2px);animation:floatB 17s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;top:74%;left:10%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff,#d6f6ec);opacity:.5;filter:blur(2px);animation:floatA 15s ease-in-out infinite\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TOP BAR -->\n  <div style=\"position:sticky;top:0;z-index:30;width:100%;display:flex;justify-content:center;background:rgba(238,242,252,.82);backdrop-filter:blur(10px);border-bottom:1px solid #dde4f5\">\n    <div style=\"width:100%;max-width:1180px;display:flex;align-items:center;gap:20px;padding:14px 24px\">\n      <div style=\"display:flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;color:#22243f;white-space:nowrap\">\n        <span style=\"font-size:22px\">🌐<\u002Fspan><span>Networking<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:6px;min-width:0\">\n        <div style=\"height:8px;border-radius:99px;background:#dbe2f4;overflow:hidden\">\n          <div style=\"height:100%;border-radius:99px;transition:width .45s cubic-bezier(.22,.9,.3,1);width:{{ progressPct }};background:{{ accent }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:5px;flex-wrap:wrap\">\n          <sc-for list=\"{{ chapters }}\" as=\"c\" hint-placeholder-count=\"15\">\n            <button onclick=\"{{ c.onClick }}\" title=\"{{ c.label }}\" style=\"width:18px;height:18px;border:none;border-radius:50%;cursor:pointer;padding:0;font-size:9px;font-weight:700;color:#fff;line-height:18px;transition:transform .15s;background:{{ c.bg }}\" style-hover=\"transform:scale(1.25)\">{{ c.num }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;white-space:nowrap\">\n        <button onclick=\"{{ toggleGlossary }}\" style=\"display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #dde4f5;border-radius:11px;padding:9px 14px;font-family:'Figtree';font-weight:600;font-size:14px;color:#3a3f5c;cursor:pointer\" style-hover=\"border-color:#3d6ef5;color:#3d6ef5\">📖 Glossary<\u002Fbutton>\n        <button onclick=\"{{ togglePlay }}\" style=\"display:flex;align-items:center;gap:7px;background:{{ accent }};border:none;border-radius:11px;padding:10px 16px;font-family:'Bricolage Grotesque';font-weight:700;font-size:14px;color:#fff;cursor:pointer\" style-hover=\"filter:brightness(1.06)\">{{ playLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- STAGE -->\n  <div style=\"width:100%;max-width:1180px;padding:30px 24px 16px;z-index:5\">\n    <div style=\"position:relative;width:100%;background:#fff;border-radius:30px;box-shadow:0 24px 60px -28px rgba(40,55,120,.35),0 2px 0 #ffffff inset;padding:52px 56px;min-height:580px;overflow:hidden\">\n\n      <!-- SCENE 0 — TITLE -->\n      <section data-scene=\"\" data-screen-label=\"Welcome\" style=\"{{ sc0 }}\">\n        <div style=\"position:absolute;top:0;right:8%;font-size:40px;animation:floatA 9s ease-in-out infinite\">📡<\u002Fdiv>\n        <div style=\"position:absolute;bottom:6%;left:6%;font-size:34px;animation:floatB 11s ease-in-out infinite\">🔌<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:#3d6ef5\">Interactive Lesson<\u002Fdiv>\n        <h1 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:62px;line-height:1.02;margin:0;max-width:16ch;letter-spacing:-.02em\">OSI, TCP/IP <span style=\"background:linear-gradient(120deg,#3d6ef5,#8a5cf6);-webkit-background-clip:text;background-clip:text;color:transparent\">&amp; the Cloud<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:21px;line-height:1.55;color:#5a6080;max-width:64ch;margin:0\">How a message really travels across a network — layer by layer — and how every step maps onto the AWS services you'll design with.<\u002Fp>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px\">\n          <span style=\"background:#eef3ff;border:1px solid #dbe6ff;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#3d6ef5\">⏱️ ~25 min<\u002Fspan>\n          <span style=\"background:#fef4e8;border:1px solid #ffe6c2;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#d98a18\">📑 15 chapters<\u002Fspan>\n          <span style=\"background:#fdeeed;border:1px solid #ffd9d5;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#e0564a\">🧠 3 quizzes<\u002Fspan>\n          <span style=\"background:#e8faf3;border:1px solid #c4f0df;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#12a87f\">🎯 Drag &amp; sort<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:14px\">\n          <button onclick=\"{{ startLesson }}\" style=\"background:#3d6ef5;color:#fff;border:none;border-radius:15px;padding:18px 34px;font-family:'Bricolage Grotesque';font-weight:700;font-size:18px;cursor:pointer;box-shadow:0 12px 24px -8px rgba(61,110,245,.6)\" style-hover=\"transform:translateY(-2px)\">Start lesson →<\u002Fbutton>\n          <button onclick=\"{{ playFromStart }}\" style=\"background:#fff;color:#3d6ef5;border:2px solid #c9d8ff;border-radius:15px;padding:16px 30px;font-family:'Bricolage Grotesque';font-weight:700;font-size:18px;cursor:pointer\" style-hover=\"border-color:#3d6ef5;background:#f5f8ff\">▶ Play as video<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;display:flex;align-items:center;gap:10px;background:#f6f8ff;border:1px solid #e7ecfa;border-radius:99px;padding:8px 8px 8px 18px\">\n          <span style=\"font-size:14px;color:#7a809c\">Prepared by<\u002Fspan>\n          <span style=\"background:#22243f;color:#fff;border-radius:99px;padding:7px 16px;font-weight:700;font-size:14px;font-family:'Bricolage Grotesque'\">Reza Shahabian<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 1 — WHY MODELS -->\n      <section data-scene=\"\" data-screen-label=\"Why models\" style=\"{{ sc1 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#19c39a\">Chapter 01 · Why a model?<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">Networks need agreed rules<\u002Fh2>\n          <p style=\"font-size:19px;line-height:1.55;color:#5a6080;margin:0;max-width:76ch\">For devices from different vendors to talk, they follow shared standards called <b>protocols<\u002Fb>. Reference <b>models<\u002Fb> organise those protocols into layers — the <b>OSI model (7 layers)<\u002Fb> and the <b>TCP/IP model<\u002Fb>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start\">\n          <div style=\"background:#f6fbf8;border:1px solid #cdeede;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:12px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#12a87f\">✉️ Think of posting a letter<\u002Fdiv>\n            <p style=\"margin:0;font-size:16px;line-height:1.6;color:#454b68\">You write the note, seal it in an addressed envelope, the post office sorts it, a truck carries it, and the steps run in reverse at the other end. Each <b>layer<\u002Fb> does one job and trusts the layer below — exactly how networks work.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div style=\"background:#f6f8ff;border:1px solid #e7ecfa;border-radius:18px;padding:18px\"><div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#3d6ef5;margin-bottom:6px\">👍 Why a layered model helps<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.6;color:#3a3f5c\">Open (vendor-neutral) · interoperable devices &amp; software · each layer designed and changed independently.<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff7f4;border:1px solid #ffe0d6;border-radius:18px;padding:18px\"><div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#e0564a;margin-bottom:6px\">⚖️ The two models<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.6;color:#3a3f5c\"><b>OSI<\u002Fb> — a 7-layer teaching reference. <b>TCP/IP<\u002Fb> — the 4/5-layer model the real internet runs on.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 2 — OSI EXPLORER -->\n      <section data-scene=\"\" data-screen-label=\"The OSI model\" style=\"{{ sc2 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#8a5cf6\">Chapter 02 · The 7 layers<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:42px;line-height:1.04;margin:0;letter-spacing:-.01em\">The OSI model<\u002Fh2>\n          <p style=\"font-size:17px;line-height:1.5;color:#5a6080;margin:0\"><b>Tap any layer<\u002Fb> to see its job, its data unit and the devices that work there.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:.92fr 1.08fr;gap:22px;align-items:start\">\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <sc-for list=\"{{ osiList }}\" as=\"L\" hint-placeholder-count=\"7\">\n              <button onclick=\"{{ L.onClick }}\" style=\"display:flex;align-items:center;gap:12px;border-radius:11px;padding:12px 15px;cursor:pointer;transition:all .15s;border:2px solid {{ L.border }};background:{{ L.bg }};color:{{ L.fg }}\"><span style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:15px;width:18px\">{{ L.n }}<\u002Fspan><span style=\"font-size:18px\">{{ L.icon }}<\u002Fspan><span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px\">{{ L.name }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n            <div style=\"margin-top:6px;background:#faf8ff;border:1px solid #ece4fb;border-radius:12px;padding:11px 14px;font-size:13px;color:#8a6fc0;line-height:1.45\"><b>Memory aid:<\u002Fb> “All People Seem To Need Data Processing” (layers 7→1).<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#f7f9ff;border:2px solid #e3ecfb;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:14px;min-height:340px\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div style=\"width:52px;height:52px;border-radius:13px;background:{{ osiInfo.color }};display:flex;align-items:center;justify-content:center;font-size:26px\">{{ osiInfo.icon }}<\u002Fdiv>\n              <div><div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;color:{{ osiInfo.color }}\">Layer {{ osiInfo.num }} · {{ osiInfo.name }}<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:#8a90a8\">PDU: {{ osiInfo.pdu }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin:0;font-size:17px;line-height:1.6;color:#454b68\">{{ osiInfo.role }}<\u002Fp>\n            <div style=\"display:flex;gap:18px;flex-wrap:wrap\">\n              <div style=\"flex:1;min-width:150px\"><div style=\"font-weight:700;font-size:13px;color:#8a90a8;margin-bottom:7px\">PROTOCOLS<\u002Fdiv><div style=\"display:flex;gap:6px;flex-wrap:wrap\"><sc-for list=\"{{ osiInfo.protocols }}\" as=\"p\" hint-placeholder-count=\"3\"><span style=\"background:#fff;border:1px solid #e4e8f5;border-radius:8px;padding:5px 11px;font-weight:600;font-size:13px;color:#3a3f5c\">{{ p.t }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;min-width:150px\"><div style=\"font-weight:700;font-size:13px;color:#8a90a8;margin-bottom:7px\">DEVICES<\u002Fdiv><div style=\"display:flex;gap:6px;flex-wrap:wrap\"><sc-for list=\"{{ osiInfo.devices }}\" as=\"d\" hint-placeholder-count=\"2\"><span style=\"background:#fff;border:1px solid #e4e8f5;border-radius:8px;padding:5px 11px;font-weight:600;font-size:13px;color:#3a3f5c\">{{ d.t }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e3ecfb;border-radius:13px;padding:13px 16px;font-size:15px;color:#5a6080\"><b style=\"color:{{ osiInfo.color }}\">In practice · <\u002Fb>{{ osiInfo.example }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 3 — ENCAPSULATION -->\n      <section data-scene=\"\" data-screen-label=\"Encapsulation\" style=\"{{ sc3 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ff6b5e\">Chapter 03 · Wrapping the data<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">Encapsulation &amp; PDUs<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:78ch\">As your data travels <b>down<\u002Fb> the stack, each layer adds its own header — and the unit gets a new name. The receiver unwraps it in reverse.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:0;align-items:stretch\">\n          <div style=\"background:#fff0ef;border:2px solid #ffd0cb;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\"><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"background:#ff6b5e;color:#fff;font-weight:800;border-radius:7px;padding:3px 9px;font-size:12px;font-family:'Bricolage Grotesque'\">L7<\u002Fspan><b>Application data<\u002Fb><\u002Fdiv><span style=\"font-weight:700;color:#ff6b5e;font-size:14px\">DATA<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center;color:#b9c0d8;font-size:15px;padding:3px\">▼ + TCP/UDP header<\u002Fdiv>\n          <div style=\"background:#eafaf4;border:2px solid #b7ecd6;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\"><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"background:#19c39a;color:#fff;font-weight:800;border-radius:7px;padding:3px 9px;font-size:12px;font-family:'Bricolage Grotesque'\">L4<\u002Fspan><b>+ ports, sequence #<\u002Fb><\u002Fdiv><span style=\"font-weight:700;color:#12a87f;font-size:14px\">SEGMENT<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center;color:#b9c0d8;font-size:15px;padding:3px\">▼ + IP header<\u002Fdiv>\n          <div style=\"background:#eef3ff;border:2px solid #c9d8ff;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\"><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"background:#3d6ef5;color:#fff;font-weight:800;border-radius:7px;padding:3px 9px;font-size:12px;font-family:'Bricolage Grotesque'\">L3<\u002Fspan><b>+ source &amp; dest IP<\u002Fb><\u002Fdiv><span style=\"font-weight:700;color:#3d6ef5;font-size:14px\">PACKET<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center;color:#b9c0d8;font-size:15px;padding:3px\">▼ + frame header &amp; trailer<\u002Fdiv>\n          <div style=\"background:#f1f0ff;border:2px solid #d4cdfb;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\"><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"background:#6b6ef5;color:#fff;font-weight:800;border-radius:7px;padding:3px 9px;font-size:12px;font-family:'Bricolage Grotesque'\">L2<\u002Fspan><b>+ MAC addresses, error check<\u002Fb><\u002Fdiv><span style=\"font-weight:700;color:#5a5ee0;font-size:14px\">FRAME<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center;color:#b9c0d8;font-size:15px;padding:3px\">▼ converted to signals<\u002Fdiv>\n          <div style=\"background:#f5f0ff;border:2px solid #ddd0fb;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\"><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"background:#8a5cf6;color:#fff;font-weight:800;border-radius:7px;padding:3px 9px;font-size:12px;font-family:'Bricolage Grotesque'\">L1<\u002Fspan><b>transmitted on the wire<\u002Fb><\u002Fdiv><span style=\"font-weight:700;color:#8a5cf6;font-size:14px\">BITS<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 4 — QUIZ 1 -->\n      <section data-scene=\"\" data-screen-label=\"Quick check 1\" style=\"{{ sc4 }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ffb43d\">🧠 Knowledge check<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:32px;line-height:1.18;margin:0;max-width:30ch\">{{ q1.question }}<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;width:100%;margin:0 auto\">\n          <sc-for list=\"{{ q1.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;border-radius:15px;padding:18px 20px;font-family:'Figtree';font-weight:600;font-size:17px;cursor:pointer;transition:all .15s;border:2px solid {{ o.border }};background:{{ o.bg }};color:{{ o.fg }}\"><span>{{ o.label }}<\u002Fspan><span style=\"font-weight:800;font-size:18px\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ q1.answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:760px;width:100%;margin:0 auto;border-radius:16px;padding:18px 22px;background:{{ q1.bannerBg }}\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:{{ q1.bannerFg }};margin-bottom:5px\">{{ q1.banner }}<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.55;color:#3a3f5c\">{{ q1.explanation }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <!-- SCENE 5 — TCP vs UDP -->\n      <section data-scene=\"\" data-screen-label=\"TCP vs UDP\" style=\"{{ sc5 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#19c39a\">Chapter 05 · The transport layer<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">TCP vs UDP<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0\">Two ways to deliver data at Layer 4 — <b>reliable<\u002Fb> or <b>fast<\u002Fb>. Tap to compare.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <sc-for list=\"{{ tudpTabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ t.onClick }}\" style=\"border:none;border-radius:13px;padding:13px 26px;font-family:'Bricolage Grotesque';font-weight:700;font-size:17px;cursor:pointer;transition:all .15s;background:{{ t.bg }};color:{{ t.fg }}\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#f7fbf9;border:2px solid #cdeede;border-radius:22px;padding:28px;display:flex;flex-direction:column;gap:16px\">\n          <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:28px;color:{{ tudpInfo.color }}\">{{ tudpInfo.title }}<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600;color:#8a90a8\">{{ tudpInfo.full }} · {{ tudpInfo.tag }}<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0;font-size:18px;line-height:1.6;color:#454b68\">{{ tudpInfo.desc }}<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n            <div><div style=\"font-weight:700;font-size:14px;color:#5a6080;margin-bottom:8px\">⚙️ How it behaves<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:6px\"><sc-for list=\"{{ tudpInfo.feats }}\" as=\"f\" hint-placeholder-count=\"4\"><div style=\"font-size:15px;color:#3a3f5c\">• {{ f.t }}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-weight:700;font-size:14px;color:#5a6080;margin-bottom:8px\">🎯 Great for<\u002Fdiv><div style=\"display:flex;gap:8px;flex-wrap:wrap\"><sc-for list=\"{{ tudpInfo.uses }}\" as=\"u\" hint-placeholder-count=\"4\"><span style=\"background:#fff;border:1px solid #d7e6df;border-radius:99px;padding:7px 14px;font-weight:600;font-size:14px;color:#3a3f5c\">{{ u.t }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 6 — HANDSHAKE -->\n      <section data-scene=\"\" data-screen-label=\"3-way handshake\" style=\"{{ sc6 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#3d6ef5\">Chapter 06 · How TCP connects<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">The three-way handshake<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:78ch\">Before sending data, TCP says hello and checks the other side is listening — like greeting someone before you start talking.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f6f9ff;border:1px solid #e3ecfb;border-radius:22px;padding:28px;display:grid;grid-template-columns:auto 1fr auto;gap:14px 20px;align-items:center\">\n          <div style=\"grid-column:1;display:flex;flex-direction:column;align-items:center;gap:6px\"><div style=\"width:60px;height:60px;border-radius:15px;background:#3d6ef5;display:flex;align-items:center;justify-content:center;font-size:28px\">💻<\u002Fdiv><b style=\"font-size:14px\">Client<\u002Fb><\u002Fdiv>\n          <div style=\"grid-column:3;display:flex;flex-direction:column;align-items:center;gap:6px\"><div style=\"width:60px;height:60px;border-radius:15px;background:#8a5cf6;display:flex;align-items:center;justify-content:center;font-size:28px\">🖥️<\u002Fdiv><b style=\"font-size:14px\">Server<\u002Fb><\u002Fdiv>\n          <div style=\"grid-column:2;grid-row:1;background:#eef3ff;border:1px solid #c9d8ff;border-radius:12px;padding:11px 16px;text-align:center\"><b style=\"color:#3d6ef5\">1 · SYN →<\u002Fb> <span style=\"color:#5a6080;font-size:14px\">“Can we talk?”<\u002Fspan><\u002Fdiv>\n          <div style=\"grid-column:2;background:#faf6ff;border:1px solid #e0d2fb;border-radius:12px;padding:11px 16px;text-align:center\"><b style=\"color:#8a5cf6\">2 · ← SYN-ACK<\u002Fb> <span style=\"color:#5a6080;font-size:14px\">“Yes — can you hear me?”<\u002Fspan><\u002Fdiv>\n          <div style=\"grid-column:2;background:#eef9f4;border:1px solid #b7ecd6;border-radius:12px;padding:11px 16px;text-align:center\"><b style=\"color:#12a87f\">3 · ACK →<\u002Fb> <span style=\"color:#5a6080;font-size:14px\">“Got it — let’s go!”<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n          <div style=\"flex:1;min-width:220px;background:#f6f8ff;border:1px solid #e7ecfa;border-radius:14px;padding:16px;font-size:15px;color:#5a6080\">Only after these 3 steps does <b style=\"color:#3d6ef5\">real data<\u002Fb> start to flow — the connection is now established and reliable.<\u002Fdiv>\n          <div style=\"flex:1;min-width:220px;background:#f6f8ff;border:1px solid #e7ecfa;border-radius:14px;padding:16px;font-size:15px;color:#5a6080\">It’s also a light <b style=\"color:#3d6ef5\">security check<\u002Fb> — you don’t start talking until you know who’s on the other end.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 7 — DRAG SORT -->\n      <section data-scene=\"\" data-screen-label=\"Sort it out\" style=\"{{ sc7 }}\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#19c39a\">🎯 Try it · Pick the protocol<\u002Fdiv>\n            <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;line-height:1.05;margin:0\">TCP or UDP?<\u002Fh2>\n            <p style=\"font-size:16px;color:#5a6080;margin:0\"><b>Tap a use-case<\u002Fb>, then <b>tap the protocol<\u002Fb> that fits best.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px\">\n            <sc-if value=\"{{ dragChecked }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;border-radius:12px;padding:11px 18px;font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;background:{{ dragScoreBg }};color:{{ dragScoreFg }}\">{{ dragScore }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <button onclick=\"{{ resetDrag }}\" style=\"background:#fff;border:1px solid #dde4f5;border-radius:12px;padding:11px 18px;font-family:'Figtree';font-weight:600;font-size:14px;color:#5a6080;cursor:pointer\">↺ Reset<\u002Fbutton>\n            <button onclick=\"{{ checkDrag }}\" style=\"background:#19c39a;border:none;border-radius:12px;padding:11px 20px;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#fff;cursor:pointer\">Check answers<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-height:54px;background:#f4f6fc;border:2px dashed #cdd6ee;border-radius:16px;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center\">\n          <span style=\"font-size:13px;font-weight:700;color:#9aa0b8;padding:0 6px\">TRAY:<\u002Fspan>\n          <sc-for list=\"{{ dragTray }}\" as=\"it\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ it.onClick }}\" style=\"border-radius:11px;padding:11px 17px;font-family:'Figtree';font-weight:600;font-size:15px;cursor:pointer;transition:all .15s;border:2px solid {{ it.border }};background:{{ it.bg }};color:{{ it.fg }}\">{{ it.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <div onclick=\"{{ dropTcp }}\" style=\"background:#f6fbf9;border:2px solid #c4f0df;border-radius:18px;padding:18px;min-height:170px;display:flex;flex-direction:column;gap:10px;cursor:pointer\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#12a87f\">🚚 TCP · reliable<\u002Fdiv>\n            <sc-for list=\"{{ dragTcp }}\" as=\"it\" hint-placeholder-count=\"0\">\n              <button onclick=\"{{ it.onClick }}\" style=\"display:flex;justify-content:space-between;align-items:center;border-radius:10px;padding:11px 14px;font-weight:600;font-size:14px;cursor:pointer;border:2px solid {{ it.border }};background:{{ it.bg }};color:{{ it.fg }}\"><span>{{ it.label }}<\u002Fspan><span style=\"font-weight:800\">{{ it.mark }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div onclick=\"{{ dropUdp }}\" style=\"background:#fff4f2;border:2px solid #ffd6cf;border-radius:18px;padding:18px;min-height:170px;display:flex;flex-direction:column;gap:10px;cursor:pointer\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#ff6b5e\">⚡ UDP · fast<\u002Fdiv>\n            <sc-for list=\"{{ dragUdp }}\" as=\"it\" hint-placeholder-count=\"0\">\n              <button onclick=\"{{ it.onClick }}\" style=\"display:flex;justify-content:space-between;align-items:center;border-radius:10px;padding:11px 14px;font-weight:600;font-size:14px;cursor:pointer;border:2px solid {{ it.border }};background:{{ it.bg }};color:{{ it.fg }}\"><span>{{ it.label }}<\u002Fspan><span style=\"font-weight:800\">{{ it.mark }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 8 — QUIZ 2 -->\n      <section data-scene=\"\" data-screen-label=\"Quick check 2\" style=\"{{ sc8 }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ffb43d\">🧠 Knowledge check<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:32px;line-height:1.18;margin:0;max-width:30ch\">{{ q2.question }}<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;width:100%;margin:0 auto\">\n          <sc-for list=\"{{ q2.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;border-radius:15px;padding:18px 20px;font-family:'Figtree';font-weight:600;font-size:17px;cursor:pointer;transition:all .15s;border:2px solid {{ o.border }};background:{{ o.bg }};color:{{ o.fg }}\"><span>{{ o.label }}<\u002Fspan><span style=\"font-weight:800;font-size:18px\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ q2.answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:760px;width:100%;margin:0 auto;border-radius:16px;padding:18px 22px;background:{{ q2.bannerBg }}\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:{{ q2.bannerFg }};margin-bottom:5px\">{{ q2.banner }}<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.55;color:#3a3f5c\">{{ q2.explanation }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <!-- SCENE 9 — IP ADDRESSING -->\n      <section data-scene=\"\" data-screen-label=\"IP addressing\" style=\"{{ sc9 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#3d6ef5\">Chapter 09 · The network layer<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">IP addressing<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:78ch\">Every device on a network needs a logical <b>IP address<\u002Fb> so packets can be routed to it. An IPv4 address is 32 bits — four 0–255 octets.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f6f9ff;border:1px solid #e3ecfb;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n          <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap\">\n            <div style=\"text-align:center\"><div style=\"background:#3d6ef5;color:#fff;border-radius:12px;padding:14px 22px;font-family:'Bricolage Grotesque';font-weight:800;font-size:26px\">192<\u002Fdiv><div style=\"font-size:11px;color:#8a90a8;margin-top:4px\">octet · 8 bits<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:flex-start;font-size:26px;color:#b9c0d8;padding-top:10px\">.<\u002Fdiv>\n            <div style=\"text-align:center\"><div style=\"background:#3d6ef5;color:#fff;border-radius:12px;padding:14px 22px;font-family:'Bricolage Grotesque';font-weight:800;font-size:26px\">168<\u002Fdiv><div style=\"font-size:11px;color:#8a90a8;margin-top:4px\">octet · 8 bits<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:flex-start;font-size:26px;color:#b9c0d8;padding-top:10px\">.<\u002Fdiv>\n            <div style=\"text-align:center\"><div style=\"background:#3d6ef5;color:#fff;border-radius:12px;padding:14px 22px;font-family:'Bricolage Grotesque';font-weight:800;font-size:26px\">1<\u002Fdiv><div style=\"font-size:11px;color:#8a90a8;margin-top:4px\">network<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:flex-start;font-size:26px;color:#b9c0d8;padding-top:10px\">.<\u002Fdiv>\n            <div style=\"text-align:center\"><div style=\"background:#19c39a;color:#fff;border-radius:12px;padding:14px 22px;font-family:'Bricolage Grotesque';font-weight:800;font-size:26px\">10<\u002Fdiv><div style=\"font-size:11px;color:#8a90a8;margin-top:4px\">host<\u002Fdiv><\u002Fdiv>\n            <div style=\"align-self:center;background:#eef3ff;border:1px solid #c9d8ff;border-radius:10px;padding:8px 14px;font-weight:700;color:#3d6ef5;font-size:14px;margin-left:6px\">/24<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0;text-align:center;font-size:14px;color:#8a90a8\">The <b>subnet mask<\u002Fb> (e.g. /24) marks where the <span style=\"color:#3d6ef5;font-weight:700\">network<\u002Fspan> part ends and the <span style=\"color:#12a87f;font-weight:700\">host<\u002Fspan> part begins.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px\">\n          <div style=\"background:#f6fbf9;border:1px solid #cdeede;border-radius:16px;padding:18px\"><div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#12a87f;margin-bottom:6px\">🏠 Private<\u002Fdiv><div style=\"font-size:14px;line-height:1.5;color:#5a6080\">Internal only: 10.x, 172.16–31.x, 192.168.x. Reused in every network.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#eef3ff;border:1px solid #d3e0ff;border-radius:16px;padding:18px\"><div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#3d6ef5;margin-bottom:6px\">🌍 Public<\u002Fdiv><div style=\"font-size:14px;line-height:1.5;color:#5a6080\">Globally unique &amp; reachable on the internet. NAT translates private ↔ public.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#faf8ff;border:1px solid #ece4fb;border-radius:16px;padding:18px\"><div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#8a5cf6;margin-bottom:6px\">⚙️ Static vs DHCP<\u002Fdiv><div style=\"font-size:14px;line-height:1.5;color:#5a6080\">Set by hand, or handed out automatically by a DHCP server.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 10 — TCP/IP vs OSI -->\n      <section data-scene=\"\" data-screen-label=\"TCP/IP vs OSI\" style=\"{{ sc10 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#8a5cf6\">Chapter 10 · Two models, one reality<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">TCP/IP vs OSI<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:78ch\">The internet runs on the leaner <b>TCP/IP model<\u002Fb>. Its layers map neatly onto OSI's seven.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:stretch\">\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <div style=\"text-align:center;font-family:'Bricolage Grotesque';font-weight:800;color:#8a5cf6;font-size:15px;margin-bottom:2px\">OSI · 7 layers<\u002Fdiv>\n            <div style=\"background:#fff0ef;border:1px solid #ffd0cb;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px\">7 · Application<\u002Fdiv>\n            <div style=\"background:#fff4ec;border:1px solid #ffe0c2;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px\">6 · Presentation<\u002Fdiv>\n            <div style=\"background:#fff8e8;border:1px solid #ffe9a8;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px\">5 · Session<\u002Fdiv>\n            <div style=\"background:#eafaf4;border:1px solid #b7ecd6;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px\">4 · Transport<\u002Fdiv>\n            <div style=\"background:#eef3ff;border:1px solid #c9d8ff;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px\">3 · Network<\u002Fdiv>\n            <div style=\"background:#f1f0ff;border:1px solid #d4cdfb;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px\">2 · Data Link<\u002Fdiv>\n            <div style=\"background:#f5f0ff;border:1px solid #ddd0fb;border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px\">1 · Physical<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <div style=\"text-align:center;font-family:'Bricolage Grotesque';font-weight:800;color:#ec7211;font-size:15px;margin-bottom:2px\">TCP/IP · practical<\u002Fdiv>\n            <div style=\"flex:1.55;background:#fff0ef;border:2px solid #ff8d4d;border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;justify-content:center\"><b style=\"font-size:15px;color:#e0564a\">Application<\u002Fb><span style=\"font-size:12.5px;color:#8a90a8\">= OSI 7 + 6 + 5 · HTTP, DNS, TLS<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1;background:#eafaf4;border:2px solid #19c39a;border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;justify-content:center\"><b style=\"font-size:15px;color:#12a87f\">Transport<\u002Fb><span style=\"font-size:12.5px;color:#8a90a8\">= OSI 4 · TCP, UDP<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1;background:#eef3ff;border:2px solid #3d6ef5;border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;justify-content:center\"><b style=\"font-size:15px;color:#3d6ef5\">Internet<\u002Fb><span style=\"font-size:12.5px;color:#8a90a8\">= OSI 3 · IP<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1.55;background:#f1f0ff;border:2px solid #6b6ef5;border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;justify-content:center\"><b style=\"font-size:15px;color:#5a5ee0\">Network Access (Link)<\u002Fb><span style=\"font-size:12.5px;color:#8a90a8\">= OSI 2 + 1 · Ethernet, Wi-Fi<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 11 — AWS x OSI -->\n      <section data-scene=\"\" data-screen-label=\"AWS × OSI\" style=\"{{ sc11 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ec7211\">Hands-on · Mapping the layers to AWS<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:42px;line-height:1.04;margin:0;letter-spacing:-.01em\">AWS components × OSI<\u002Fh2>\n          <p style=\"font-size:17px;line-height:1.5;color:#5a6080;margin:0\">Every OSI layer has matching AWS services. <b>Tap a layer<\u002Fb> to see which.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:.82fr 1.18fr;gap:22px;align-items:start\">\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <sc-for list=\"{{ awsLayerList }}\" as=\"L\" hint-placeholder-count=\"7\">\n              <button onclick=\"{{ L.onClick }}\" style=\"display:flex;align-items:center;gap:10px;border-radius:11px;padding:11px 15px;cursor:pointer;transition:all .15s;border:2px solid {{ L.border }};background:{{ L.bg }};color:{{ L.fg }}\"><span style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:14px;width:16px\">{{ L.n }}<\u002Fspan><span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:14px\">{{ L.name }}<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff7ef;border:2px solid #ffe0c2;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:16px;min-height:330px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;color:#ec7211\">Layer {{ awsLayerInfo.num }} · {{ awsLayerInfo.name }}<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px\">\n              <sc-for list=\"{{ awsLayerInfo.services }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #ffe0c2;border-radius:13px;padding:12px 14px\"><div style=\"width:44px;height:44px;flex-shrink:0;border-radius:11px;background:{{ s.color }};display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 14px -6px {{ s.color }}\">{{ s.glyph }}<\u002Fdiv><div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:15px;color:#22243f\">{{ s.code }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #ffe0c2;border-radius:13px;padding:14px 16px;font-size:15px;line-height:1.55;color:#5a6080\">{{ awsLayerInfo.note }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 12 — AWS NETWORKING ARCHITECTURE -->\n      <section data-scene=\"\" data-screen-label=\"AWS networking\" style=\"{{ sc12 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ec7211\">Hands-on · Design an AWS network<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:42px;line-height:1.04;margin:0;letter-spacing:-.01em\">A VPC, layer by layer<\u002Fh2>\n          <p style=\"font-size:17px;line-height:1.5;color:#5a6080;margin:0;max-width:80ch\">Here's how those layers come together in a real AWS network design.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.25fr .75fr;gap:22px;align-items:start\">\n          <div style=\"background:#f7f9ff;border:1px solid #e3ecfb;border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"font-size:24px\">🌍<\u002Fdiv><div style=\"font-size:11px;font-weight:700;color:#5a6080\">Internet<\u002Fdiv><\u002Fdiv>\n              <span style=\"color:#b9c0d8\">→<\u002Fspan>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:44px;height:44px;border-radius:11px;background:#8c4fff;display:flex;align-items:center;justify-content:center;font-size:21px\">🌉<\u002Fdiv><div style=\"font-size:11px;font-weight:700;color:#5a6080\">Internet GW<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:2px dashed #c9b6ff;border-radius:16px;padding:16px;position:relative;margin-top:6px\">\n              <div style=\"position:absolute;top:-11px;left:18px;background:#8c4fff;color:#fff;font-size:11px;font-weight:800;border-radius:7px;padding:4px 10px;font-family:'Bricolage Grotesque'\">🔒 VPC · 10.0.0.0/16<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:8px\">\n                <div style=\"background:#eef3ff;border:1px solid #c9d8ff;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px\"><span style=\"background:#3d6ef5;color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px\">PUBLIC SUBNET<\u002Fspan><div style=\"display:flex;gap:8px\"><div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:36px;height:36px;border-radius:9px;background:#8c4fff;display:flex;align-items:center;justify-content:center;font-size:17px\">⚖️<\u002Fdiv><span style=\"font-size:10px;font-weight:700\">ALB<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:36px;height:36px;border-radius:9px;background:#8c4fff;display:flex;align-items:center;justify-content:center;font-size:17px\">🌉<\u002Fdiv><span style=\"font-size:10px;font-weight:700\">NAT GW<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;color:#b9c0d8;font-size:14px\">▼ route table<\u002Fdiv>\n                <div style=\"background:#f6fbf9;border:1px solid #c4f0df;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px\"><span style=\"background:#12a87f;color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px\">PRIVATE SUBNET<\u002Fspan><div style=\"display:flex;gap:8px\"><div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:36px;height:36px;border-radius:9px;background:#ec7211;display:flex;align-items:center;justify-content:center;font-size:17px\">🖥️<\u002Fdiv><span style=\"font-size:10px;font-weight:700\">EC2<\u002Fspan><\u002Fdiv><div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:36px;height:36px;border-radius:9px;background:#3b48cc;display:flex;align-items:center;justify-content:center;font-size:17px\">🛢️<\u002Fdiv><span style=\"font-size:10px;font-weight:700\">RDS<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:4px\">\n              <span style=\"background:#fff;border:1px solid #ffd0d6;border-radius:9px;padding:6px 12px;font-size:12px;font-weight:700;color:#dd344c\">🛡️ Security Group · L4 ports<\u002Fspan>\n              <span style=\"background:#fff;border:1px solid #ffd0d6;border-radius:9px;padding:6px 12px;font-size:12px;font-weight:700;color:#dd344c\">🚦 NACL · L3 subnet<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div style=\"background:#fff7ef;border:1px solid #ffe0c2;border-radius:16px;padding:16px;font-size:14.5px;line-height:1.55;color:#5a6080\"><b style=\"color:#ec7211\">Reading it as layers:<\u002Fb> the IGW &amp; route tables are <b>L3<\u002Fb>, the security group filters <b>L4<\u002Fb> ports, the ALB speaks <b>L7<\u002Fb> HTTP — the OSI model, made real.<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:13px;color:#8a90a8\">📸 Drop your own VPC diagram or console screenshot<\u002Fdiv>\n            <image-slot id=\"net-shot-1\" style=\"width:100%;height:180px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a VPC / console screenshot\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 13 — QUIZ 3 -->\n      <section data-scene=\"\" data-screen-label=\"Final check\" style=\"{{ sc13 }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ffb43d\">🧠 Final knowledge check<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:32px;line-height:1.18;margin:0;max-width:32ch\">{{ q3.question }}<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;width:100%;margin:0 auto\">\n          <sc-for list=\"{{ q3.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;border-radius:15px;padding:18px 20px;font-family:'Figtree';font-weight:600;font-size:17px;cursor:pointer;transition:all .15s;border:2px solid {{ o.border }};background:{{ o.bg }};color:{{ o.fg }}\"><span>{{ o.label }}<\u002Fspan><span style=\"font-weight:800;font-size:18px\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ q3.answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:760px;width:100%;margin:0 auto;border-radius:16px;padding:18px 22px;background:{{ q3.bannerBg }}\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:{{ q3.bannerFg }};margin-bottom:5px\">{{ q3.banner }}<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.55;color:#3a3f5c\">{{ q3.explanation }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <!-- SCENE 14 — WRAP-UP -->\n      <section data-scene=\"\" data-screen-label=\"Wrap-up\" style=\"{{ sc14 }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px\">\n          <div style=\"font-size:44px\">🎉<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#3d6ef5\">Session wrap-up<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:44px;line-height:1.04;margin:0;letter-spacing:-.01em\">You can read the network now<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <div style=\"background:#f1f5ff;border:1px solid #d3e0ff;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:#3d6ef5\">✅ Covered<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">The OSI 7-layer model, encapsulation &amp; PDUs, TCP vs UDP, IP addressing and the TCP/IP model.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#f7f2ff;border:1px solid #e3d5fb;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:#8a5cf6\">🛠️ Applied<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">Mapping each layer to real AWS components — VPC, subnets, gateways, load balancers and security groups.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff7ef;border:1px solid #ffe0c2;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:#ec7211\">🤔 Reflected<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">Why models matter, and how the same layers you learned drive how you design a cloud network.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <div style=\"background:#f6f8ff;border:1px solid #e7ecfa;border-radius:18px;padding:22px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;margin-bottom:10px\">🎯 You should now be able to…<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;font-size:15px;color:#3a3f5c\">\n              <div>• Name the OSI layers and what each one does<\u002Fdiv>\n              <div>• Choose TCP vs UDP and explain encapsulation<\u002Fdiv>\n              <div>• Map AWS services onto the OSI layers<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:linear-gradient(150deg,#eef3ff,#fff3e8);border:1px solid #ffe0c2;border-radius:18px;padding:22px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;margin-bottom:10px\">🚀 Looking ahead<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">Next: build a VPC hands-on — subnets, route tables and security groups — and deploy an EC2 instance into it.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:4px\">\n          <button onclick=\"{{ startLesson }}\" style=\"background:#fff;color:#3d6ef5;border:2px solid #c9d8ff;border-radius:14px;padding:14px 26px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;cursor:pointer\" style-hover=\"background:#f5f8ff\">↻ Review from the start<\u002Fbutton>\n          <button onclick=\"{{ toggleGlossary }}\" style=\"background:#3d6ef5;color:#fff;border:none;border-radius:14px;padding:14px 26px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;cursor:pointer\">📖 Open glossary<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-size:14px;color:#9aa0b8;margin-top:6px\">Lesson prepared by <b style=\"color:#5a6080\">Reza Shahabian<\u002Fb><\u002Fdiv>\n      <\u002Fsection>\n\n      <!--SCENES-->\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- BOTTOM NAV -->\n  <div style=\"position:sticky;bottom:0;z-index:20;width:100%;display:flex;justify-content:center;background:linear-gradient(to top,#eef2fc 55%,transparent);padding:10px 24px 22px\">\n    <div style=\"width:100%;max-width:1180px;display:flex;align-items:center;justify-content:space-between;gap:14px\">\n      <button onclick=\"{{ prev }}\" style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #dde4f5;border-radius:13px;padding:13px 22px;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#3a3f5c;cursor:pointer\" style-hover=\"border-color:#9fb4ff\">← Back<\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:12px;font-weight:600;color:#7a809c;font-size:15px\">\n        <span style=\"font-family:'Bricolage Grotesque';color:#22243f;font-size:17px\">{{ sceneNum }}<\u002Fspan>\n        <span style=\"color:#c2c8de\">/<\u002Fspan>\n        <span>{{ total }}<\u002Fspan>\n        <span style=\"color:#b9c0d8\">·<\u002Fspan>\n        <span style=\"color:#3a3f5c\">{{ sceneTitle }}<\u002Fspan>\n      <\u002Fdiv>\n      <button onclick=\"{{ next }}\" style=\"display:flex;align-items:center;gap:8px;background:{{ accent }};border:none;border-radius:13px;padding:13px 26px;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#fff;cursor:pointer;box-shadow:0 10px 20px -10px rgba(40,55,120,.5)\" style-hover=\"transform:translateY(-2px)\">Next →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- GLOSSARY PANEL -->\n  <sc-if value=\"{{ glossaryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ toggleGlossary }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(34,36,63,.34);backdrop-filter:blur(2px)\"><\u002Fdiv>\n    <div style=\"position:fixed;top:0;right:0;bottom:0;z-index:51;width:min(460px,92vw);background:#fff;box-shadow:-20px 0 60px -20p raw bits as electrical, optical or radio signals.',protocols:['Ethernet PHY','Wi\\u2011Fi'],devices:['Cable','Hub','Repeater'],example:'Voltage on a copper wire.'},\n  };\n  osiOrder = [7,6,5,4,3,2,1];\n\n  tudpData = {\n    tcp:{title:'TCP',full:'Transmission Control Protocol',color:'#19c39a',tag:'Reliable & ordered',\n      desc:'Connection-oriented. Guarantees every byte arrives, in order, with retransmission, error checking, flow & congestion control \\u2014 at the cost of extra overhead.',\n      feats:['3-way handshake to connect','Ordered, acknowledged delivery','Retransmits lost packets','Flow & congestion control'],\n      uses:['Web (HTTP/S)','Email','File transfer','Bank transfers']},\n    udp:{title:'UDP',full:'User Datagram Protocol',color:'#ff6b5e',tag:'Fast & best-effort',\n      desc:'Connectionless. Fires packets with almost no overhead and no guarantee of delivery or order \\u2014 perfect when speed matters more than perfection.',\n      feats:['No handshake \\u2014 just send','No delivery guarantee','Very low overhead','Lowest latency'],\n      uses:['Live video & voice','Online gaming','DNS lookups','Streaming']},\n  };\n\n  awsByLayer = {\n    7:{services:[{code:'Route 53',glyph:'\\ud83c\\udf10',color:'#8c4fff'},{code:'CloudFront',glyph:'\\ud83d\\ude80',color:'#8c4fff'},{code:'API Gateway',glyph:'\\ud83d\\udeaa',color:'#8c4fff'},{code:'ALB',glyph:'\\u2696\\ufe0f',color:'#8c4fff'}],note:'Application-aware services: DNS, CDN, API routing and the Application Load Balancer (HTTP/HTTPS).'},\n    6:{services:[{code:'ACM',glyph:'\\ud83d\\udd10',color:'#dd344c'},{code:'TLS / HTTPS',glyph:'\\ud83d\\udd12',color:'#dd344c'}],note:'Encryption & formatting: AWS Certificate Manager issues TLS certs; CloudFront/ALB terminate HTTPS.'},\n    5:{services:[{code:'Cognito',glyph:'\\ud83d\\udd11',color:'#dd344c'}],note:'Sessions & auth: services like Amazon Cognito manage user sessions and tokens.'},\n    4:{services:[{code:'NLB',glyph:'\\u2696\\ufe0f',color:'#8c4fff'},{code:'Security Group',glyph:'\\ud83d\\udee1\\ufe0f',color:'#dd344c'}],note:'Transport-aware: the Network Load Balancer works at L4, and Security Groups filter by TCP/UDP port.'},\n    3:{services:[{code:'VPC',glyph:'\\ud83d\\udd12',color:'#8c4fff'},{code:'Subnets',glyph:'\\ud83e\\udde9',color:'#8c4fff'},{code:'Route Table',glyph:'\\ud83d\\uddfa\\ufe0f',color:'#8c4fff'},{code:'Internet GW',glyph:'\\ud83c\\udf09',color:'#8c4fff'},{code:'NACL',glyph:'\\ud83d\\udea6',color:'#dd344c'}],note:'The heart of AWS networking \\u2014 VPCs, subnets, route tables, gateways and network ACLs all deal in IP addresses & routing.'},\n    2:{services:[{code:'ENI',glyph:'\\ud83d\\udd0c',color:'#8c4fff'}],note:'Each instance gets an Elastic Network Interface (ENI) with a virtual MAC address \\u2014 the data-link layer.'},\n    1:{services:[{code:'Regions',glyph:'\\ud83d\\uddfa\\ufe0f',color:'#ec7211'},{code:'Availability Zones',glyph:'\\ud83c\\udfd7\\ufe0f',color:'#ec7211'}],note:'The physical layer: AWS Regions, Availability Zones, data centers and the fibre between them.'},\n  };\n\n  dragMeta = {\n    web:{label:'Web page (HTTP)',cat:'tcp'}, email:{label:'Email (SMTP)',cat:'tcp'}, bank:{label:'Bank transfer',cat:'tcp'},\n    video:{label:'Live video call',cat:'udp'}, game:{label:'Online gaming',cat:'udp'}, dns:{label:'DNS lookup',cat:'udp'},\n  };\n  dragOrder = ['web','email','bank','video','game','dns'];\n\n  quizDefs = {\n    q1:{question:'Routers forward traffic between networks using logical IP addresses. At which OSI layer do they operate?',\n      options:[{label:'Layer 2 \\u2014 Data Link'},{label:'Layer 3 \\u2014 Network',correct:true},{label:'Layer 4 \\u2014 Transport'},{label:'Layer 7 \\u2014 Application'}],\n      explanation:'Routers work at Layer 3 (Network), using IP addresses to route packets. Switches operate one layer down, at Layer 2, using MAC addresses.'},\n    q2:{question:'You\\u2019re building a live video-call app where low latency matters more than perfect delivery. Which transport protocol fits best?',\n      options:[{label:'TCP'},{label:'UDP',correct:true},{label:'IP'},{label:'HTTP'}],\n      explanation:'UDP is connectionless and low-overhead \\u2014 ideal for real-time voice, video and gaming, where a dropped packet matters less than speed.'},\n    q3:{question:'As data travels down the stack, each layer wraps it. What is the Layer 3 unit \\u2014 the one a router forwards \\u2014 called?',\n      options:[{label:'Frame'},{label:'Segment'},{label:'Packet',correct:true},{label:'Bit'}],\n      explanation:'PDUs by layer: L4 = segment, L3 = packet, L2 = frame, L1 = bits. Routers forward packets, which is why the internet is often described in terms of packets.'},\n  };\n\n  glossary = [\n    {icon:'\\ud83e\\ude9c',term:'OSI model',def:'A 7-layer reference model (Application \\u2192 Physical) describing how networks are built and function.'},\n    {icon:'\\ud83c\\udf10',term:'TCP/IP model',def:'The 4/5-layer model the real internet runs on: Application, Transport, Internet (Network), Link, (Physical).'},\n    {icon:'\\ud83d\\udcdc',term:'Protocol',def:'An agreed set of rules that lets devices from different vendors communicate.'},\n    {icon:'\\ud83d\\udce6',term:'Encapsulation',def:'Each layer wrapping the data from the layer above with its own header (and sometimes trailer).'},\n    {icon:'\\ud83e\\udde9',term:'PDU',def:'Protocol Data Unit \\u2014 the name for data at a given layer: segment, packet, frame or bits.'},\n    {icon:'\\ud83d\\ude9a',term:'TCP',def:'Reliable, connection-oriented transport: ordered delivery, retransmission, flow & congestion control.'},\n    {icon:'\\u26a1',term:'UDP',def:'Fast, connectionless, best-effort transport with minimal overhead and no delivery guarantee.'},\n    {icon:'\\ud83e\\udd1d',term:'Three-way handshake',def:'TCP\\u2019s SYN \\u2192 SYN-ACK \\u2192 ACK exchange that establishes a connection before data flows.'},\n    {icon:'\\ud83d\\udeaa',term:'Port number',def:'A number identifying a specific application/service on a host (e.g. 80 = HTTP, 443 = HTTPS).'},\n    {icon:'\\ud83d\\uddfa\\ufe0f',term:'IP address',def:'A logical Layer-3 address identifying a host on a network so packets can be routed to it.'},\n    {icon:'\\ud83c\\udfe0',term:'Private vs public IP',def:'Private ranges (10.x, 172.16\\u201331.x, 192.168.x) are internal; public addresses are reachable on the internet.'},\n    {icon:'\\u2702\\ufe0f',term:'Subnet mask',def:'Splits an IP address into network and host portions, dividing a network into smaller subnets.'},\n    {icon:'\\ud83d\\udd17',term:'MAC address',def:'A hardware (Layer-2) address burned into a network interface, used on the local link.'},\n    {icon:'\\ud83d\\udd12',term:'VPC',def:'Amazon Virtual Private Cloud \\u2014 your own isolated, software-defined network inside AWS.'},\n    {icon:'\\ud83d\\udee1\\ufe0f',term:'Security group',def:'A stateful virtual firewall on AWS resources that allows traffic by protocol and port (Layer 4).'},\n    {icon:'\\u2696\\ufe0f',term:'Load balancer',def:'Distributes traffic across targets \\u2014 ALB works at Layer 7 (HTTP), NLB at Layer 4 (TCP/UDP).'},\n  ];\n\n  componentDidMount(){}\n  componentWillUnmount(){ window.removeEventListener('keydown', this.onKey); clearTimeout(this.t); }\n  ensureWiring(){\n    if(!this._kb){ this._kb=true; window.addEventListener('keydown', this.onKey); }\n    if(this._lastIdx!==this.state.idx || this._lastPlay!==this.state.playing){\n      this._lastIdx=this.state.idx; this._lastPlay=this.state.playing; this.scheduleAutoplay();\n    }\n  }\n  onKey = (e)=>{\n    const tag=(e.target&&e.target.tagName)||'';\n    if(tag==='INPUT'||tag==='TEXTAREA') return;\n    if(e.key==='ArrowRight'){ this.next(); }\n    else if(e.key==='ArrowLeft'){ this.prev(); }\n    else if(e.key===' '){ e.preventDefault(); this.togglePlay(); }\n  };\n\n  sceneCfg = [\n    {gap:22,center:true,pos:true},{gap:24},{gap:18},{gap:20},{gap:22,vcenter:true},\n    {gap:20},{gap:20},{gap:18},{gap:22,vcenter:true},{gap:20},\n    {gap:20},{gap:18},{gap:20},{gap:22,vcenter:true},{gap:22},\n  ];\n  sceneStyle(k){\n    const c=this.sceneCfg[k]; const on=this.state.idx===k;\n    const s={display:on?'flex':'none',flexDirection:'column',minHeight:'560px',gap:c.gap+'px',width:'100%'};\n    if(c.center){ s.alignItems='center'; s.justifyContent='center'; s.textAlign='center'; }\n    if(c.vcenter){ s.justifyContent='center'; }\n    if(c.pos){ s.position='relative'; }\n    return s;\n  }\n\n  scheduleAutoplay(){\n    clearTimeout(this.t);\n    const i=this.state.idx;\n    if(this.state.playing && !this.interactive.has(i) && i<this.total-1){\n      this.t=setTimeout(()=>this.next(), this.durations[i]||9000);\n    }\n  }\n\n  next=()=> this.setState(s=> s.idx<this.total-1 ? {idx:s.idx+1} : {playing:false});\n  prev=()=> this.setState(s=> ({idx:Math.max(0,s.idx-1)}));\n  goTo=(i)=>()=> this.setState({idx:i});\n  togglePlay=()=> this.setState(s=>({playing:!s.playing}));\n  startLesson=()=> this.setState({idx:1});\n  playFromStart=()=> this.setState({idx:1, playing:true});\n  toggleGlossary=()=> this.setState(s=>({glossary:!s.glossary}));\n\n  answer=(q,i)=> this.setState(s=> s.quiz[q]!=null ? null : ({quiz:{...s.quiz,[q]:i}}));\n  setOsi=(n)=>()=> this.setState({osi:n});\n  setTudp=(t)=>()=> this.setState({tudp:t});\n  setAwsLayer=(n)=>()=> this.setState({awsLayer:n});\n\n  pick=(id)=>()=> this.setState(s=>({sel: s.sel===id?null:id}));\n  drop=(b)=>()=> this.setState(s=>{ if(!s.sel) return null; return {drops:{...s.drops,[s.sel]:b}, sel:null}; });\n  toTray=(id)=>()=> this.setState(s=>({drops:{...s.drops,[id]:null}, sel:null}));\n  checkDrag=()=> this.setState({dragChecked:true, sel:null});\n  resetDrag=()=> this.setState({drops:{email:null,bank:null,web:null,video:null,game:null,dns:null}, dragChecked:false, sel:null});\n\n  buildQuiz(qKey){\n    const def=this.quizDefs[qKey]; const sel=this.state.quiz[qKey];\n    const options=def.options.map((o,i)=>{\n      let bg='#fff',fg='#22243f',border='#e4e8f5',mark='';\n      if(sel!=null){\n        if(o.correct){ bg='#e7f9f1';fg='#0c7a52';border='#19c39a';mark='\\u2713'; }\n        else if(i===sel){ bg='#fdeceb';fg='#c2362b';border='#ff6b5e';mark='\\u2717'; }\n        else { fg='#9aa0b8';border='#eef1f8'; }\n      }\n      return {label:o.label,bg,fg,border,mark,onClick:()=>this.answer(qKey,i)};\n    });\n    const answered=sel!=null;\n    const isCorrect=answered && def.options[sel].correct;\n    return {question:def.question,options,answered,isCorrect,explanation:def.explanation,\n      banner: !answered ? '' : (isCorrect?'\\u2705 Correct!':'\\u274c Not quite \\u2014'),\n      bannerBg: !answered ? '' : (isCorrect?'#e7f9f1':'#fdeceb'),\n      bannerFg: !answered ? '' : (isCorrect?'#0c7a52':'#c2362b')};\n  }\n\n  buildDragItem(id, place){\n    const m=this.dragMeta[id]; const drops=this.state.drops; const checked=this.state.dragChecked;\n    const selected=this.state.sel===id;\n    let bg='#fff',fg='#22243f',border='#dde4f5',mark='';\n    if(checked && place!=='tray'){\n      const ok=drops[id]===m.cat;\n      bg=ok?'#e7f9f1':'#fdeceb'; fg=ok?'#0c7a52':'#c2362b'; border=ok?'#19c39a':'#ff6b5e'; mark=ok?'\\u2713':'\\u2717';\n    } else if(selected){ bg='#eef3ff'; border='#3d6ef5'; }\n    const onClick = place==='tray' ? this.pick(id) : this.toTray(id);\n    return {id,label:m.label,bg,fg,border,mark,selected,onClick};\n  }\n\n  renderVals(){\n    this.ensureWiring();\n    const i=this.state.idx;\n    const accent=this.chapColors[i]||'#3d6ef5';\n    const sc={}; for(let k=0;k<this.total;k++) sc['sc'+k]=this.sceneStyle(k);\n    const chapters=this.chapTitles.map((t,k)=>({num:k+1,label:t,onClick:this.goTo(k),bg: k===i?this.chapColors[k] : (k<i?'#aab6dd':'#dbe2f4')}));\n\n    // OSI explorer\n    const osiList=this.osiOrder.map(n=>{\n      const L=this.osiData[n]; const on=this.state.osi===n;\n      return {n,name:L.name,icon:L.icon,onClick:this.setOsi(n),\n        bg:on?L.color:'#f4f6fc', fg:on?'#fff':'#3a3f5c', border:on?L.color:'#e7ecfa'};\n    });\n    const od=this.osiData[this.state.osi];\n    const osiInfo={...od, num:this.state.osi, protocols:od.protocols.map(t=>({t})), devices:od.devices.map(t=>({t}))};\n\n    // TCP vs UDP\n    const td=this.tudpData[this.state.tudp];\n    const tudpTabs=Object.keys(this.tudpData).map(k=>({key:k,label:this.tudpData[k].title,active:this.state.tudp===k,onClick:this.setTudp(k),bg:this.state.tudp===k?this.tudpData[k].color:'#f1f4fb',fg:this.state.tudp===k?'#fff':'#5a6080'}));\n    const tudpInfo={...td, feats:td.feats.map(t=>({t})), uses:td.uses.map(t=>({t}))};\n\n    // AWS x OSI\n    const awsLayerList=this.osiOrder.map(n=>{\n      const L=this.osiData[n]; const on=this.state.awsLayer===n;\n      return {n,name:L.name,onClick:this.setAwsLayer(n),bg:on?'#ec7211':'#f4f6fc',fg:on?'#fff':'#3a3f5c',border:on?'#ec7211':'#e7ecfa'};\n    });\n    const al=this.awsByLayer[this.state.awsLayer];\n    const awsLayerInfo={name:this.osiData[this.state.awsLayer].name, num:this.state.awsLayer, note:al.note, services:al.services};\n\n    // drag\n    const tray=this.dragOrder.filter(id=>this.state.drops[id]==null).map(id=>this.buildDragItem(id,'tray'));\n    const bucket=(b)=>this.dragOrder.filter(id=>this.state.drops[id]===b).map(id=>this.buildDragItem(id,b));\n    const correct=this.dragOrder.filter(id=>this.state.drops[id]===this.dragMeta[id].cat).length;\n\n    return {\n      ...sc,\n      progressPct: Math.round(i/(this.total-1)*100)+'%',\n      accent, sceneNum:i+1, total:this.total, sceneTitle:this.chapTitles[i], chapters,\n      next:this.next, prev:this.prev, togglePlay:this.togglePlay,\n      playLabel: this.state.playing?'\\u23f8 Pause':'\\u25b6 Play',\n      startLesson:this.startLesson, playFromStart:this.playFromStart,\n      glossaryOpen:this.state.glossary, toggleGlossary:this.toggleGlossary, glossary:this.glossary,\n      osiList, osiInfo,\n      tudpTabs, tudpInfo,\n      awsLayerList, awsLayerInfo,\n      q1:this.buildQuiz('q1'), q2:this.buildQuiz('q2'), q3:this.buildQuiz('q3'),\n      dragTray:tray, dragTcp:bucket('tcp'), dragUdp:bucket('udp'),\n      dropTcp:this.drop('tcp'), dropUdp:this.drop('udp'),\n      checkDrag:this.checkDrag, resetDrag:this.resetDrag, dragChecked:this.state.dragChecked,\n      dragScore:correct+' / 6 correct', dragScoreBg: correct===6?'#e7f9f1':'#fff4e8', dragScoreFg: correct===6?'#0c7a52':'#d98a18',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
