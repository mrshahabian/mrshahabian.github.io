  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e0e29b32-be80-4ded-8a45-31825b2c3dbb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6b06d31f-fb52-4d7e-93f9-a915e040cc88\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{background:#eef2fc;font-family:'Figtree',system-ui,sans-serif;color:#22243f;-webkit-font-smoothing:antialiased}\n  @keyframes floatA{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-22px) translateX(10px)}}\n  @keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}\n  @keyframes popIn{0%{transform:scale(0) translateY(8px);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}\n  input[type=range].asg{-webkit-appearance:none;appearance:none;height:12px;border-radius:99px;outline:none}\n  input[type=range].asg::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:30px;height:30px;border-radius:50%;background:#fff;border:4px solid #ec7211;cursor:pointer;box-shadow:0 4px 10px -2px rgba(40,55,120,.4)}\n  input[type=range].asg::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:#fff;border:4px solid #ec7211;cursor:pointer}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#c7d0ea;border-radius:8px}\n<\u002Fstyle>\n<script src=\"5e4be244-0612-4815-abce-50229a56141a\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;position:relative;overflow-x:hidden;display:flex;flex-direction:column;align-items:center\">\n\n  <div style=\"position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden\">\n    <div style=\"position:absolute;top:12%;left:6%;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff,#dbe6ff);opacity:.5;filter:blur(2px);animation:floatA 13s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;top:58%;left:80%;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff,#ffe7c8);opacity:.45;filter:blur(2px);animation:floatB 17s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;top:74%;left:10%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffffff,#d6f6ec);opacity:.5;filter:blur(2px);animation:floatA 15s ease-in-out infinite\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TOP BAR -->\n  <div style=\"position:sticky;top:0;z-index:30;width:100%;display:flex;justify-content:center;background:rgba(238,242,252,.82);backdrop-filter:blur(10px);border-bottom:1px solid #dde4f5\">\n    <div style=\"width:100%;max-width:1180px;display:flex;align-items:center;gap:20px;padding:14px 24px\">\n      <div style=\"display:flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;color:#22243f;white-space:nowrap\">\n        <span style=\"font-size:22px\">📈<\u002Fspan><span>Scaling &amp; ELB<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:6px;min-width:0\">\n        <div style=\"height:8px;border-radius:99px;background:#dbe2f4;overflow:hidden\">\n          <div style=\"height:100%;border-radius:99px;transition:width .45s cubic-bezier(.22,.9,.3,1);width:{{ progressPct }};background:{{ accent }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:5px;flex-wrap:wrap\">\n          <sc-for list=\"{{ chapters }}\" as=\"c\" hint-placeholder-count=\"16\">\n            <button onclick=\"{{ c.onClick }}\" title=\"{{ c.label }}\" style=\"width:18px;height:18px;border:none;border-radius:50%;cursor:pointer;padding:0;font-size:9px;font-weight:700;color:#fff;line-height:18px;transition:transform .15s;background:{{ c.bg }}\" style-hover=\"transform:scale(1.25)\">{{ c.num }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;white-space:nowrap\">\n        <button onclick=\"{{ toggleGlossary }}\" style=\"display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #dde4f5;border-radius:11px;padding:9px 14px;font-family:'Figtree';font-weight:600;font-size:14px;color:#3a3f5c;cursor:pointer\" style-hover=\"border-color:#3d6ef5;color:#3d6ef5\">📖 Glossary<\u002Fbutton>\n        <button onclick=\"{{ togglePlay }}\" style=\"display:flex;align-items:center;gap:7px;background:{{ accent }};border:none;border-radius:11px;padding:10px 16px;font-family:'Bricolage Grotesque';font-weight:700;font-size:14px;color:#fff;cursor:pointer\" style-hover=\"filter:brightness(1.06)\">{{ playLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- STAGE -->\n  <div style=\"width:100%;max-width:1180px;padding:30px 24px 16px;z-index:5\">\n    <div style=\"position:relative;width:100%;background:#fff;border-radius:30px;box-shadow:0 24px 60px -28px rgba(40,55,120,.35),0 2px 0 #ffffff inset;padding:52px 56px;min-height:580px;overflow:hidden\">\n\n      <!-- SCENE 0 — TITLE -->\n      <section data-scene=\"\" data-screen-label=\"Welcome\" style=\"{{ sc0 }}\">\n        <div style=\"position:absolute;top:0;right:8%;font-size:40px;animation:floatA 9s ease-in-out infinite\">⚖️<\u002Fdiv>\n        <div style=\"position:absolute;bottom:6%;left:6%;font-size:34px;animation:floatB 11s ease-in-out infinite\">📊<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:#ec7211\">Interactive Lesson · Hands-on AWS<\u002Fdiv>\n        <h1 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:58px;line-height:1.02;margin:0;max-width:15ch;letter-spacing:-.02em\">Auto Scaling <span style=\"background:linear-gradient(120deg,#ec7211,#8a5cf6);-webkit-background-clip:text;background-clip:text;color:transparent\">&amp; Load Balancing<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:21px;line-height:1.55;color:#5a6080;max-width:65ch;margin:0\">How the elastic cloud grows and shrinks with demand — scaling strategies, EC2 Auto Scaling groups, Elastic Load Balancing, the CAP theorem and CloudWatch.<\u002Fp>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px\">\n          <span style=\"background:#fff4e8;border:1px solid #ffe6c2;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#d98a18\">⏱️ ~26 min<\u002Fspan>\n          <span style=\"background:#eef3ff;border:1px solid #dbe6ff;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#3d6ef5\">📑 16 chapters<\u002Fspan>\n          <span style=\"background:#fdeeed;border:1px solid #ffd9d5;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#e0564a\">🧠 3 quizzes<\u002Fspan>\n          <span style=\"background:#e8faf3;border:1px solid #c4f0df;border-radius:99px;padding:8px 16px;font-weight:600;font-size:15px;color:#12a87f\">🎯 Live ASG sim<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:14px\">\n          <button onclick=\"{{ startLesson }}\" style=\"background:#ec7211;color:#fff;border:none;border-radius:15px;padding:18px 34px;font-family:'Bricolage Grotesque';font-weight:700;font-size:18px;cursor:pointer;box-shadow:0 12px 24px -8px rgba(236,114,17,.55)\" style-hover=\"transform:translateY(-2px)\">Start lesson →<\u002Fbutton>\n          <button onclick=\"{{ playFromStart }}\" style=\"background:#fff;color:#ec7211;border:2px solid #ffd9b8;border-radius:15px;padding:16px 30px;font-family:'Bricolage Grotesque';font-weight:700;font-size:18px;cursor:pointer\" style-hover=\"border-color:#ec7211;background:#fff8f1\">▶ Play as video<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;display:flex;align-items:center;gap:10px;background:#f6f8ff;border:1px solid #e7ecfa;border-radius:99px;padding:8px 8px 8px 18px\">\n          <span style=\"font-size:14px;color:#7a809c\">Prepared by<\u002Fspan>\n          <span style=\"background:#22243f;color:#fff;border-radius:99px;padding:7px 16px;font-weight:700;font-size:14px;font-family:'Bricolage Grotesque'\">Reza Shahabian<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 1 — WHY ELASTIC -->\n      <section data-scene=\"\" data-screen-label=\"The elastic cloud\" style=\"{{ sc1 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#3d6ef5\">Chapter 01 · The promise of the cloud<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">Demand is never flat<\u002Fh2>\n          <p style=\"font-size:19px;line-height:1.55;color:#5a6080;margin:0;max-width:82ch\">Traffic spikes at lunchtime, on launch day, during a sale — then falls away at 3am. Buy for the peak and you waste money; buy for the average and you crash. The cloud's answer: <b>scale automatically<\u002Fb>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start\">\n          <div style=\"background:#fff2f0;border:1px solid #ffd6cf;border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#e0564a\">🏚️ The old way<\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#454b68\">Provision a fixed fleet for the worst-case peak. It sits <b>idle and expensive<\u002Fb> most of the time — and still falls over when an unexpected surge arrives.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#f6fbf9;border:1px solid #c4f0df;border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#12a87f\">📈 The elastic way<\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.55;color:#454b68\">Add capacity automatically as load rises, and <b>remove it when load drops<\u002Fb>. You pay for what you use, and the app stays healthy through the spike.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#faf8ff;border:1px solid #ece4fb;border-radius:16px;padding:16px 22px;display:flex;gap:14px;align-items:center\">\n          <span style=\"font-size:26px\">🧩<\u002Fspan>\n          <p style=\"margin:0;font-size:15.5px;line-height:1.5;color:#5a6080\"><b>Two AWS services make it happen:<\u002Fb> <b style=\"color:#ec7211\">EC2 Auto Scaling<\u002Fb> adds and removes instances, and <b style=\"color:#3d6ef5\">Elastic Load Balancing<\u002Fb> spreads traffic evenly across them. We'll build up both — starting with what \"scaling\" even means.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 2 — VERTICAL VS HORIZONTAL -->\n      <section data-scene=\"\" data-screen-label=\"Vertical vs Horizontal\" style=\"{{ sc2 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#8a5cf6\">Chapter 02 · Two directions<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:42px;line-height:1.04;margin:0;letter-spacing:-.01em\">Vertical vs Horizontal scaling<\u002Fh2>\n          <p style=\"font-size:17px;line-height:1.5;color:#5a6080;margin:0\">Bigger machines, or more machines? <b>Tap to compare<\u002Fb> — watch the fleet change shape.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <sc-for list=\"{{ scaleTabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ t.onClick }}\" style=\"display:flex;align-items:center;gap:8px;border:none;border-radius:13px;padding:13px 22px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;cursor:pointer;transition:all .15s;background:{{ t.bg }};color:{{ t.fg }}\"><span style=\"font-size:17px\">{{ t.icon }}<\u002Fspan>{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:.8fr 1.2fr;gap:22px;align-items:stretch\">\n          <div style=\"background:#f7f9ff;border:2px solid #e3ecfb;border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:230px\">\n            <sc-if value=\"{{ scaleInfo.vBig }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n                <div style=\"display:flex;gap:8px;align-items:flex-end\">\n                  <div style=\"width:44px;height:44px;border-radius:11px;background:#cdbcf5;display:flex;align-items:center;justify-content:center;font-size:20px\">🖥️<\u002Fdiv>\n                  <span style=\"font-size:24px;color:#8a5cf6;font-weight:800\">→<\u002Fspan>\n                  <div style=\"width:88px;height:88px;border-radius:15px;background:#8a5cf6;display:flex;align-items:center;justify-content:center;font-size:40px;animation:popIn .4s ease\">🖥️<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:14px;color:#8a5cf6\">Same count, bigger machine<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ scaleInfo.vMany }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n                <div style=\"display:flex;gap:8px;align-items:center\">\n                  <div style=\"width:44px;height:44px;border-radius:11px;background:#19c39a;display:flex;align-items:center;justify-content:center;font-size:20px\">🖥️<\u002Fdiv>\n                  <span style=\"font-size:24px;color:#19c39a;font-weight:800\">→<\u002Fspan>\n                  <div style=\"display:flex;gap:6px\">\n                    <div style=\"width:44px;height:44px;border-radius:11px;background:#19c39a;display:flex;align-items:center;justify-content:center;font-size:20px;animation:popIn .35s ease\">🖥️<\u002Fdiv>\n                    <div style=\"width:44px;height:44px;border-radius:11px;background:#19c39a;display:flex;align-items:center;justify-content:center;font-size:20px;animation:popIn .45s ease\">🖥️<\u002Fdiv>\n                    <div style=\"width:44px;height:44px;border-radius:11px;background:#19c39a;display:flex;align-items:center;justify-content:center;font-size:20px;animation:popIn .55s ease\">🖥️<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:14px;color:#12a87f\">More machines, same size<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"background:#fafbff;border:1px solid #e7ecfa;border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:12px\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-size:24px\">{{ scaleInfo.icon }}<\u002Fspan><div><div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;color:{{ scaleInfo.color }}\">{{ scaleInfo.name }}<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:#8a90a8\">{{ scaleInfo.sub }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.55;color:#454b68\">{{ scaleInfo.desc }}<\u002Fp>\n            <div style=\"display:flex;gap:16px;flex-wrap:wrap\">\n              <div style=\"flex:1;min-width:150px\"><div style=\"font-weight:700;font-size:13px;color:#0c7a52;margin-bottom:6px\">👍 Pros<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:5px\"><sc-for list=\"{{ scaleInfo.pros }}\" as=\"p\" hint-placeholder-count=\"2\"><div style=\"font-size:14px;color:#3a3f5c;line-height:1.4\">• {{ p.t }}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;min-width:150px\"><div style=\"font-weight:700;font-size:13px;color:#c2362b;margin-bottom:6px\">👎 Cons<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:5px\"><sc-for list=\"{{ scaleInfo.cons }}\" as=\"c\" hint-placeholder-count=\"3\"><div style=\"font-size:14px;color:#3a3f5c;line-height:1.4\">• {{ c.t }}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f6fbf9;border:1px solid #c4f0df;border-radius:14px;padding:13px 20px;font-size:14.5px;color:#12a87f\">📡 Horizontal scaling is the cloud default — but it <b>needs a load balancer<\u002Fb> to spread traffic across the running VMs. That's chapter 10.<\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 3 — ELASTICITY -->\n      <section data-scene=\"\" data-screen-label=\"Elasticity\" style=\"{{ sc3 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#19c39a\">Chapter 03 · Scaling, both ways<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">Scalability vs Elasticity<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:82ch\">They overlap — both manage changing demand — but there's a key difference in <b>what happens when demand drops<\u002Fb>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n          <div style=\"background:#f6f8ff;border:2px solid #d3e0ff;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"font-size:30px\">📈<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;color:#3d6ef5\">Scalability<\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.55;color:#454b68\">The ability to <b>ramp capacity up<\u002Fb> to meet rising demand. It handles growth — but doesn't necessarily give the capacity back.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#f6fbf9;border:2px solid #c4f0df;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"font-size:30px\">🤸<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;color:#12a87f\">Elasticity<\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.55;color:#454b68\">Everything scalability does — <b>plus automatically reducing capacity<\u002Fb> when demand falls. Up <i>and<\u002Fi> back down, hands-free.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff7ef;border:1px solid #ffe0c2;border-radius:16px;padding:16px 22px;display:flex;gap:14px;align-items:center\">\n          <span style=\"font-size:26px\">💸<\u002Fspan>\n          <p style=\"margin:0;font-size:15.5px;line-height:1.5;color:#9a6a18\"><b>Why elasticity matters:<\u002Fb> giving capacity back is exactly what saves money. An elastic system automatically shrinks at 3am so you're not paying for idle servers — the heart of <b>cost optimisation<\u002Fb>.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 4 — QUIZ 1 -->\n      <section data-scene=\"\" data-screen-label=\"Quick check 1\" style=\"{{ sc4 }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ffb43d\">🧠 Knowledge check<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:31px;line-height:1.18;margin:0;max-width:34ch\">{{ q1.question }}<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;width:100%;margin:0 auto\">\n          <sc-for list=\"{{ q1.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;border-radius:15px;padding:18px 20px;font-family:'Figtree';font-weight:600;font-size:16px;cursor:pointer;transition:all .15s;border:2px solid {{ o.border }};background:{{ o.bg }};color:{{ o.fg }}\"><span>{{ o.label }}<\u002Fspan><span style=\"font-weight:800;font-size:18px\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ q1.answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:760px;width:100%;margin:0 auto;border-radius:16px;padding:18px 22px;background:{{ q1.bannerBg }}\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:{{ q1.bannerFg }};margin-bottom:5px\">{{ q1.banner }}<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.55;color:#3a3f5c\">{{ q1.explanation }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <!-- SCENE 5 — ASG SIMULATOR -->\n      <section data-scene=\"\" data-screen-label=\"Auto Scaling sim\" style=\"{{ sc5 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:4px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ec7211\">🎯 Live simulator · EC2 Auto Scaling<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:36px;line-height:1.04;margin:0;letter-spacing:-.01em\">Drag the load — watch the group scale<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"background:#fafbff;border:1px solid #e7ecfa;border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap\">\n          <span style=\"font-size:13px;font-weight:700;color:#8a90a8;white-space:nowrap\">TRAFFIC LOAD<\u002Fspan>\n          <input type=\"range\" class=\"asg\" min=\"0\" max=\"5\" step=\"1\" value=\"{{ asg.load }}\" oninput=\"{{ setLoad }}\" style=\"flex:1;min-width:200px;background:linear-gradient(90deg,#19c39a,#ec7211,#e0564a)\">\n          <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e7ecfa;border-radius:10px;padding:7px 14px\"><span style=\"width:10px;height:10px;border-radius:50%;background:{{ asg.loadColor }}\"><\u002Fspan><span style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:14px;color:{{ asg.loadColor }}\">{{ asg.loadLabel }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f7f9ff;border:2px solid #e3ecfb;border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:16px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"width:40px;height:40px;border-radius:10px;background:#8c4fff;display:flex;align-items:center;justify-content:center;font-size:19px\">⚖️<\u002Fdiv><span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#5a6080\">ALB distributes traffic →<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;background:#fff7ef;border:1px solid #ffe0c2;border-radius:10px;padding:7px 14px;font-family:'Bricolage Grotesque';font-weight:800;font-size:14px;color:#ec7211\">⚙️ {{ asg.action }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n            <div style=\"background:#fff;border:1px solid #e3ecfb;border-radius:14px;padding:16px;min-height:150px\">\n              <div style=\"font-size:11px;font-weight:800;color:#8a90a8;font-family:'Bricolage Grotesque';margin-bottom:12px\">🏗️ AVAILABILITY ZONE A · {{ asg.azAn }}<\u002Fdiv>\n              <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n                <sc-for list=\"{{ asg.azA }}\" as=\"n\" hint-placeholder-count=\"1\">\n                  <div style=\"width:48px;height:48px;border-radius:11px;background:linear-gradient(160deg,#f7a850,#ec7211);display:flex;align-items:center;justify-content:center;font-size:22px;animation:popIn .35s ease;box-shadow:0 6px 14px -6px rgba(236,114,17,.6)\">🖥️<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e3ecfb;border-radius:14px;padding:16px;min-height:150px\">\n              <div style=\"font-size:11px;font-weight:800;color:#8a90a8;font-family:'Bricolage Grotesque';margin-bottom:12px\">🏗️ AVAILABILITY ZONE B · {{ asg.azBn }}<\u002Fdiv>\n              <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n                <sc-for list=\"{{ asg.azB }}\" as=\"n\" hint-placeholder-count=\"1\">\n                  <div style=\"width:48px;height:48px;border-radius:11px;background:linear-gradient(160deg,#f7a850,#ec7211);display:flex;align-items:center;justify-content:center;font-size:22px;animation:popIn .35s ease;box-shadow:0 6px 14px -6px rgba(236,114,17,.6)\">🖥️<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap\">\n            <div style=\"text-align:center\"><div style=\"font-size:11px;font-weight:700;color:#8a90a8\">RUNNING<\u002Fdiv><div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;color:#ec7211\">{{ asg.count }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"height:34px;width:1px;background:#e3ecfb\"><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;font-size:13px;color:#5a6080\"><span>min <b>1<\u002Fb><\u002Fspan><span style=\"color:#c2c8de\">·<\u002Fspan><span>desired <b>2<\u002Fb><\u002Fspan><span style=\"color:#c2c8de\">·<\u002Fspan><span>max <b>4<\u002Fb><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fffbe9;border:1px solid #ffe9a8;border-radius:14px;padding:12px 20px;font-size:14px;color:#9a7a18\">💡 Auto Scaling spreads instances <b>evenly across AZs<\u002Fb> — new ones launch in the zone with the fewest. It never goes below <b>min<\u002Fb> or above <b>max<\u002Fb>.<\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 6 — MIN / DESIRED / MAX -->\n      <section data-scene=\"\" data-screen-label=\"Min / Desired / Max\" style=\"{{ sc6 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ec7211\">Chapter 06 · The three numbers<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:46px;line-height:1.04;margin:0;letter-spacing:-.01em\">Min · Desired · Max<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:82ch\">Every Auto Scaling group is defined by three numbers. They're the guard-rails the service works within.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <div style=\"background:#f6fbf9;border:2px solid #c4f0df;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;color:#12a87f\">Min<\u002Fdiv>\n            <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#454b68\">The floor. The group <b>never drops below<\u002Fb> this — your baseline capacity, always running.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff7ef;border:2px solid #ffe0c2;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;color:#ec7211\">Desired<\u002Fdiv>\n            <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#454b68\">The target it holds right now. Scaling policies move this number up and down between min and max.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff2f0;border:2px solid #ffd6cf;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;color:#e0564a\">Max<\u002Fdiv>\n            <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#454b68\">The ceiling. The group <b>never rises above<\u002Fb> this — your budget &amp; safety cap.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n          <div style=\"flex:1;min-width:230px;background:#f6f8ff;border:1px solid #e7ecfa;border-radius:14px;padding:16px\"><div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#3d6ef5;margin-bottom:5px\">↗️ Scaling out (up)<\u002Fdiv><div style=\"font-size:14px;color:#5a6080;line-height:1.5\">Adding instances to the group as load rises.<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;min-width:230px;background:#f6f8ff;border:1px solid #e7ecfa;border-radius:14px;padding:16px\"><div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#3d6ef5;margin-bottom:5px\">↘️ Scaling in (down)<\u002Fdiv><div style=\"font-size:14px;color:#5a6080;line-height:1.5\">Removing instances as load falls — the elasticity that saves money.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 7 — ASG COMPONENTS -->\n      <section data-scene=\"\" data-screen-label=\"ASG components\" style=\"{{ sc7 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#8a5cf6\">Chapter 07 · The building blocks<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:44px;line-height:1.04;margin:0;letter-spacing:-.01em\">Anatomy of an Auto Scaling group<\u002Fh2>\n          <p style=\"font-size:17px;line-height:1.5;color:#5a6080;margin:0;max-width:82ch\">Three pieces work together to make scaling happen.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n          <div style=\"background:#faf8ff;border:1px solid #ece4fb;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"width:46px;height:46px;border-radius:11px;background:#8a5cf6;display:flex;align-items:center;justify-content:center;font-size:22px\">📦<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#8a5cf6\">Group<\u002Fdiv>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#5a6080\">EC2 instances treated as one logical unit, with min, desired &amp; max sizes.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#faf8ff;border:1px solid #ece4fb;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"width:46px;height:46px;border-radius:11px;background:#8a5cf6;display:flex;align-items:center;justify-content:center;font-size:22px\">📜<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#8a5cf6\">Launch template<\u002Fdiv>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#5a6080\">The blueprint for each instance: AMI, instance type, key pair, security groups, block devices.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#faf8ff;border:1px solid #ece4fb;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"width:46px;height:46px;border-radius:11px;background:#8a5cf6;display:flex;align-items:center;justify-content:center;font-size:22px\">⚙️<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#8a5cf6\">Scaling options<\u002Fdiv>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#5a6080\">How it scales — on conditions (dynamic), on a schedule, or to keep a target metric.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f6f8ff;border:1px solid #e7ecfa;border-radius:16px;padding:16px 22px;display:flex;gap:14px;align-items:center\">\n          <span style=\"font-size:24px\">📜<\u002Fspan>\n          <p style=\"margin:0;font-size:15px;line-height:1.5;color:#5a6080\"><b>Launch templates are versioned.<\u002Fb> To change one, you create a new numbered version — so you can roll forward or back. They beat the older \"launch configuration\" (fewer features, not recommended), and also work for one-off instances and Spot fleets.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 8 — QUIZ 2 -->\n      <section data-scene=\"\" data-screen-label=\"Quick check 2\" style=\"{{ sc8 }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ffb43d\">🧠 Knowledge check<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:31px;line-height:1.18;margin:0;max-width:34ch\">{{ q2.question }}<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;width:100%;margin:0 auto\">\n          <sc-for list=\"{{ q2.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;border-radius:15px;padding:18px 20px;font-family:'Figtree';font-weight:600;font-size:16px;cursor:pointer;transition:all .15s;border:2px solid {{ o.border }};background:{{ o.bg }};color:{{ o.fg }}\"><span>{{ o.label }}<\u002Fspan><span style=\"font-weight:800;font-size:18px\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ q2.answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:760px;width:100%;margin:0 auto;border-radius:16px;padding:18px 22px;background:{{ q2.bannerBg }}\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:{{ q2.bannerFg }};margin-bottom:5px\">{{ q2.banner }}<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.55;color:#3a3f5c\">{{ q2.explanation }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <!-- SCENE 9 — MULTI-AZ & HEALTH -->\n      <section data-scene=\"\" data-screen-label=\"Multi-AZ &amp; health\" style=\"{{ sc9 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#19c39a\">Chapter 09 · Staying healthy<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:44px;line-height:1.04;margin:0;letter-spacing:-.01em\">Fault tolerance &amp; self-healing<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:82ch\">Auto Scaling isn't only about load — it keeps your app <b>alive<\u002Fb> too.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <div style=\"background:#f6fbf9;border:1px solid #c4f0df;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-size:28px\">🏥<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#12a87f\">Self-healing<\u002Fdiv>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#5a6080\">Fails a <b>health check<\u002Fb>? Auto Scaling terminates the bad instance and launches a fresh replacement.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#eef3ff;border:1px solid #d3e0ff;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-size:28px\">🌐<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#3d6ef5\">Multi-AZ<\u002Fdiv>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#5a6080\">Spread across Availability Zones. If one AZ fails, it launches in another to compensate.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff7ef;border:1px solid #ffe0c2;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-size:28px\">⚖️<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:#ec7211\">Balanced<\u002Fdiv>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#5a6080\">It keeps <b>equal numbers per AZ<\u002Fb>, launching new ones where there are fewest.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#faf8ff;border:1px solid #ece4fb;border-radius:14px;padding:14px 20px;font-size:14.5px;color:#5a6080\">💰 <b>And it's free:<\u002Fb> there's no extra charge for EC2 Auto Scaling itself — you pay only for the resources it creates (instances, EBS volumes, CloudWatch alarms).<\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 10 — LOAD BALANCING -->\n      <section data-scene=\"\" data-screen-label=\"Load balancing\" style=\"{{ sc10 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#3d6ef5\">Chapter 10 · Spreading the traffic<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:44px;line-height:1.04;margin:0;letter-spacing:-.01em\">Elastic Load Balancing<\u002Fh2>\n          <p style=\"font-size:18px;line-height:1.5;color:#5a6080;margin:0;max-width:82ch\">A load balancer sits in front of your instances and <b>distributes incoming traffic<\u002Fb> across them — so no single server is overwhelmed while others sit idle, and traffic never goes to a failed server.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f7f9ff;border:2px solid #e3ecfb;border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:14px\">\n          <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"font-size:24px\">👥<\u002Fdiv><span style=\"font-size:11px;font-weight:700;color:#5a6080\">Users<\u002Fspan><\u002Fdiv>\n            <span style=\"color:#b9c0d8;font-size:20px\">→<\u002Fspan>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:54px;height:54px;border-radius:13px;background:#8c4fff;display:flex;align-items:center;justify-content:center;font-size:26px\">⚖️<\u002Fdiv><span style=\"font-size:11px;font-weight:700;color:#5a6080\">Load balancer<\u002Fspan><\u002Fdiv>\n            <span style=\"color:#b9c0d8;font-size:20px\">→<\u002Fspan>\n            <div style=\"display:flex;gap:8px\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:46px;height:46px;border-radius:11px;background:#ec7211;display:flex;align-items:center;justify-content:center;font-size:21px\">🖥️<\u002Fdiv><span style=\"font-size:10px;color:#12a87f;font-weight:700\">✓ healthy<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\"><div style=\"width:46px;height:46px;border-radius:11px;background:#ec7211;display:flex;align-items:center;justify-content:center;font-size:21px\">🖥️<\u002Fdiv><span style=\"font-size:10px;color:#12a87f;font-weight:700\">✓ healthy<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.45\"><div style=\"width:46px;height:46px;border-radius:11px;background:#b9c0d8;display:flex;align-items:center;justify-content:center;font-size:21px\">🖥️<\u002Fdiv><span style=\"font-size:10px;color:#e0564a;font-weight:700\">✕ skipped<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0;text-align:center;font-size:14px;color:#8a90a8\">It <b>health-checks<\u002Fb> every target and routes only to healthy ones — improving availability, scalability, security, fault tolerance &amp; performance.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff7ef;border:1px solid #ffe0c2;border-radius:14px;padding:13px 20px;font-size:14.5px;color:#9a6a18\">🔗 <b>Pairs with Auto Scaling:<\u002Fb> give the ASG your ALB's target-group name, and every new instance is <b>automatically registered<\u002Fb> with the load balancer.<\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 11 — ELB TYPES -->\n      <section data-scene=\"\" data-screen-label=\"Types of ELB\" style=\"{{ sc11 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:4px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#3d6ef5\">Chapter 11 · Pick the right one<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;line-height:1.04;margin:0;letter-spacing:-.01em\">Four types of load balancer<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.5;color:#5a6080;margin:0\"><b>Tap each<\u002Fb> to see what it routes and when to use it.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <sc-for list=\"{{ lbTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ t.onClick }}\" style=\"border:none;border-radius:12px;padding:12px 22px;font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;cursor:pointer;transition:all .15s;background:{{ t.bg }};color:{{ t.fg }}\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#f7f9ff;border:2px solid #e3ecfb;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:14px;min-height:230px\">\n          <div style=\"display:flex;align-items:center;gap:14px\"><div style=\"width:54px;height:54px;border-radius:14px;background:{{ lbInfo.color }};display:flex;align-items:center;justify-content:center;font-size:26px\">{{ lbInfo.icon }}<\u002Fdiv><div><div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:23px;color:{{ lbInfo.color }}\">{{ lbInfo.name }}<\u002Fdiv><div style=\"display:inline-flex;align-items:center;gap:6px;margin-top:3px;background:#fff;border:1px solid #e3ecfb;border-radius:7px;padding:3px 10px;font-size:12px;font-weight:700;color:#5a6080\">{{ lbInfo.layer }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <p style=\"margin:0;font-size:17px;line-height:1.6;color:#454b68\">{{ lbInfo.routes }}<\u002Fp>\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap\">\n            <div style=\"flex:1;min-width:200px;background:#fff;border:1px solid #e3ecfb;border-radius:13px;padding:14px 16px\"><div style=\"font-size:11px;font-weight:700;color:#8a90a8;margin-bottom:4px\">BEST FOR<\u002Fdiv><div style=\"font-size:15px;font-weight:600;color:#3a3f5c\">{{ lbInfo.best }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1;min-width:200px;background:#fff;border:1px solid #e3ecfb;border-radius:13px;padding:14px 16px\"><div style=\"font-size:11px;font-weight:700;color:#8a90a8;margin-bottom:4px\">NOTE<\u002Fdiv><div style=\"font-size:15px;color:#5a6080\">{{ lbInfo.note }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 12 — CAP THEOREM -->\n      <section data-scene=\"\" data-screen-label=\"CAP theorem\" style=\"{{ sc12 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:4px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ff6b5e\">Chapter 12 · Distributed-systems law<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;line-height:1.04;margin:0;letter-spacing:-.01em\">The CAP theorem — pick two<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.5;color:#5a6080;margin:0\">Brewer (2000): a distributed system can guarantee only <b>two<\u002Fb> of three. <b>Tap a pair.<\u002Fb><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <sc-for list=\"{{ capTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ t.onClick }}\" style=\"border:none;border-radius:12px;padding:12px 26px;font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;cursor:pointer;transition:all .15s;background:{{ t.bg }};color:{{ t.fg }}\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:.85fr 1.15fr;gap:22px;align-items:center\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n            <sc-for list=\"{{ capInfo.triangle }}\" as=\"n\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:10px;width:100%;border-radius:13px;padding:13px 18px;transition:all .25s;border:2px solid {{ n.border }};background:{{ n.bg }};color:{{ n.fg }}\"><span style=\"font-size:20px\">{{ n.icon }}<\u002Fspan><span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:16px\">{{ n.label }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff7f4;border:2px solid #ffe0d6;border-radius:20px;padding:24px;display:flex;flex-direction:column;gap:12px;min-height:200px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;color:{{ capInfo.color }}\">{{ capInfo.title }}<\u002Fdiv>\n            <p style=\"margin:0;font-size:16px;line-height:1.6;color:#454b68\">{{ capInfo.desc }}<\u002Fp>\n            <div style=\"background:#fff;border:1px solid #ffe0d6;border-radius:12px;padding:12px 16px;font-size:14.5px;color:#5a6080\"><b style=\"color:{{ capInfo.color }}\">Trades away {{ capInfo.lostLabel }}. <\u002Fb>{{ capInfo.example }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fffbe9;border:1px solid #ffe9a8;border-radius:14px;padding:12px 20px;font-size:14px;color:#9a7a18\">💡 In a real network, <b>partitions are unavoidable<\u002Fb> — so practical systems must keep partition tolerance and choose between <b>AP<\u002Fb> and <b>CP<\u002Fb>. Pure CA only exists on a single node.<\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SCENE 13 — CLOUDWATCH, DRAG & BUILD -->\n      <section data-scene=\"\" data-screen-label=\"CloudWatch &amp; build\" style=\"{{ sc13 }}\">\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ec7211\">Chapter 13 · Monitoring &amp; the activity<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;line-height:1.04;margin:0;letter-spacing:-.01em\">CloudWatch triggers the scaling<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.5;color:#5a6080;margin:0;max-width:84ch\">It all comes together: CloudWatch watches the metrics and fires the alarms that tell Auto Scaling when to act.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <div style=\"background:#f6f8ff;border:1px solid #e7ecfa;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"width:44px;height:44px;border-radius:11px;background:#3d6ef5;display:flex;align-items:center;justify-content:center;font-size:21px\">📊<\u002Fdiv><div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;color:#3d6ef5\">Amazon CloudWatch<\u002Fdiv><\u002Fdiv>\n            <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#454b68\">Monitors metrics (CPU, requests…) for your instances and groups. <b>Alarms<\u002Fb> on those metrics enable scaling policies — e.g. \"CPU &gt; 70% → scale out\".<\u002Fp>\n            <div style=\"display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:1px solid #e7ecfa;border-radius:11px;padding:11px;font-size:12.5px;font-weight:700;color:#5a6080;flex-wrap:wrap\"><span>📊 metric<\u002Fspan><span style=\"color:#b9c0d8\">→<\u002Fspan><span>🔔 alarm<\u002Fspan><span style=\"color:#b9c0d8\">→<\u002Fspan><span style=\"color:#ec7211\">⚙️ scale<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#f6fbf9;border:1px solid #c4f0df;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"width:44px;height:44px;border-radius:11px;background:#12a87f;display:flex;align-items:center;justify-content:center;font-size:21px\">🌱<\u002Fdiv><div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;color:#12a87f\">Elastic Beanstalk<\u002Fdiv><\u002Fdiv>\n            <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#454b68\">A managed service that abstracts provisioning entirely — <b>push your code<\u002Fb> and Beanstalk launches and manages the EC2, scaling and load balancing for you in the background.<\u002Fp>\n            <div style=\"background:#fff;border:1px solid #c4f0df;border-radius:11px;padding:10px 14px;font-size:13px;color:#5a6080\">It uses Auto Scaling &amp; ELB under the hood — now you know what's happening down there.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- mini drag -->\n        <div style=\"background:#fafbff;border:1px solid #e7ecfa;border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n            <div><div style=\"font-family:'Bricolage Grotesque';font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:#19c39a\">🎯 Quick sort · which load balancer?<\u002Fdiv><div style=\"font-size:13px;color:#5a6080;margin-top:2px\"><b>Tap a need<\u002Fb>, then <b>tap the LB<\u002Fb> that fits.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <sc-if value=\"{{ dragChecked }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;border-radius:10px;padding:8px 14px;font-family:'Bricolage Grotesque';font-weight:800;font-size:14px;background:{{ dragScoreBg }};color:{{ dragScoreFg }}\">{{ dragScore }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <button onclick=\"{{ resetDrag }}\" style=\"background:#fff;border:1px solid #dde4f5;border-radius:10px;padding:8px 14px;font-family:'Figtree';font-weight:600;font-size:13px;color:#5a6080;cursor:pointer\">↺<\u002Fbutton>\n              <button onclick=\"{{ checkDrag }}\" style=\"background:#19c39a;border:none;border-radius:10px;padding:8px 16px;font-family:'Bricolage Grotesque';font-weight:700;font-size:13px;color:#fff;cursor:pointer\">Check<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"min-height:44px;background:#f4f6fc;border:2px dashed #cdd6ee;border-radius:13px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n            <span style=\"font-size:12px;font-weight:700;color:#9aa0b8;padding:0 4px\">TRAY:<\u002Fspan>\n            <sc-for list=\"{{ dragTray }}\" as=\"it\" hint-placeholder-count=\"6\">\n              <button onclick=\"{{ it.onClick }}\" style=\"border-radius:9px;padding:9px 14px;font-family:'Figtree';font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;border:2px solid {{ it.border }};background:{{ it.bg }};color:{{ it.fg }}\">{{ it.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:rep
