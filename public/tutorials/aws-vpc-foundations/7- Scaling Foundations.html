;max-width:760px;width:100%;margin:0 auto\">\n          <sc-for list=\"{{ q3.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ o.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;border-radius:15px;padding:18px 20px;font-family:'Figtree';font-weight:600;font-size:16px;cursor:pointer;transition:all .15s;border:2px solid {{ o.border }};background:{{ o.bg }};color:{{ o.fg }}\"><span>{{ o.label }}<\u002Fspan><span style=\"font-weight:800;font-size:18px\">{{ o.mark }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ q3.answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:760px;width:100%;margin:0 auto;border-radius:16px;padding:18px 22px;background:{{ q3.bannerBg }}\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:{{ q3.bannerFg }};margin-bottom:5px\">{{ q3.banner }}<\u002Fdiv>\n            <div style=\"font-size:16px;line-height:1.55;color:#3a3f5c\">{{ q3.explanation }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n\n      <!-- SCENE 15 — WRAP-UP -->\n      <section data-scene=\"\" data-screen-label=\"Wrap-up\" style=\"{{ sc15 }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px\">\n          <div style=\"font-size:44px\">🎉<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque';font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#ec7211\">Session wrap-up<\u002Fdiv>\n          <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:44px;line-height:1.04;margin:0;letter-spacing:-.01em\">You can build elastic systems<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <div style=\"background:#eef3ff;border:1px solid #d3e0ff;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:#3d6ef5\">✅ Covered<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">Scalability &amp; elasticity — vertical vs horizontal scaling, and why elasticity gives capacity back.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff7ef;border:1px solid #ffe0c2;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:#ec7211\">🛠️ Applied<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">EC2 Auto Scaling groups (min/desired/max, launch templates) and Elastic Load Balancing across AZs.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#fff2f0;border:1px solid #ffd6cf;border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:8px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:#e0564a\">🤔 Reflected<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">Fault tolerance, cost optimisation, the CAP theorem, and CloudWatch monitoring for resilient systems.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <div style=\"background:#f6f8ff;border:1px solid #e7ecfa;border-radius:18px;padding:22px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;margin-bottom:10px\">🎯 You should now be able to…<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;font-size:15px;color:#3a3f5c\">\n              <div>• Explain cloud scalability &amp; elasticity<\u002Fdiv>\n              <div>• Configure Auto Scaling groups &amp; load balancers<\u002Fdiv>\n              <div>• Evaluate the CAP theorem &amp; CloudWatch in resilient design<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:linear-gradient(150deg,#fff3e8,#f7f2ff);border:1px solid #ffe0c2;border-radius:18px;padding:22px\">\n            <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;margin-bottom:10px\">🚀 Looking ahead<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.55;color:#454b68\">Advanced cloud automation &amp; deployment frameworks — and applying scalable, fault-tolerant design to your assignment.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:4px\">\n          <button onclick=\"{{ startLesson }}\" style=\"background:#fff;color:#ec7211;border:2px solid #ffd9b8;border-radius:14px;padding:14px 26px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;cursor:pointer\" style-hover=\"background:#fff8f1\">↻ Review from the start<\u002Fbutton>\n          <button onclick=\"{{ toggleGlossary }}\" style=\"background:#ec7211;color:#fff;border:none;border-radius:14px;padding:14px 26px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;cursor:pointer\">📖 Open glossary<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-size:14px;color:#9aa0b8;margin-top:6px\">Lesson prepared by <b style=\"color:#5a6080\">Reza Shahabian<\u002Fb><\u002Fdiv>\n      <\u002Fsection>\n\n      <!--SCENES-->\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- BOTTOM NAV -->\n  <div style=\"position:sticky;bottom:0;z-index:20;width:100%;display:flex;justify-content:center;background:linear-gradient(to top,#eef2fc 55%,transparent);padding:10px 24px 22px\">\n    <div style=\"width:100%;max-width:1180px;display:flex;align-items:center;justify-content:space-between;gap:14px\">\n      <button onclick=\"{{ prev }}\" style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #dde4f5;border-radius:13px;padding:13px 22px;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#3a3f5c;cursor:pointer\" style-hover=\"border-color:#9fb4ff\">← Back<\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:12px;font-weight:600;color:#7a809c;font-size:15px\">\n        <span style=\"font-family:'Bricolage Grotesque';color:#22243f;font-size:17px\">{{ sceneNum }}<\u002Fspan>\n        <span style=\"color:#c2c8de\">/<\u002Fspan>\n        <span>{{ total }}<\u002Fspan>\n        <span style=\"color:#b9c0d8\">·<\u002Fspan>\n        <span style=\"color:#3a3f5c\">{{ sceneTitle }}<\u002Fspan>\n      <\u002Fdiv>\n      <button onclick=\"{{ next }}\" style=\"display:flex;align-items:center;gap:8px;background:{{ accent }};border:none;border-radius:13px;padding:13px 26px;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#fff;cursor:pointer;box-shadow:0 10px 20px -10px rgba(40,55,120,.5)\" style-hover=\"transform:translateY(-2px)\">Next →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- GLOSSARY PANEL -->\n  <sc-if value=\"{{ glossaryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ toggleGlossary }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(34,36,63,.34);backdrop-filter:blur(2px)\"><\u002Fdiv>\n    <div style=\"position:fixed;top:0;right:0;bottom:0;z-index:51;width:min(460px,92vw);background:#fff;box-shadow:-20px 0 60px -20px rgba(40,55,120,.4);display:flex;flex-direction:column\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:24px 26px;border-bottom:1px solid #eef1f8\">\n        <div style=\"display:flex;flex-direction:column;gap:2px\">\n          <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:22px\">📖 Glossary<\u002Fdiv>\n          <div style=\"font-size:13px;color:#8a90a8\">Scaling &amp; load-balancing terms<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ toggleGlossary }}\" style=\"background:#f1f4fb;border:none;border-radius:10px;width:38px;height:38px;font-size:18px;cursor:pointer;color:#5a6080\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"overflow-y:auto;padding:18px 26px 40px;display:flex;flex-direction:column;gap:14px\">\n        <sc-for list=\"{{ glossary }}\" as=\"g\" hint-placeholder-count=\"6\">\n          <div style=\"border:1px solid #eef1f8;border-radius:14px;padding:14px 16px;background:#fafbff\">\n            <div style=\"display:flex;align-items:center;gap:8px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;color:#22243f\"><span>{{ g.icon }}<\u002Fspan>{{ g.term }}<\u002Fdiv>\n            <div style=\"font-size:14.5px;line-height:1.5;color:#5a6080;margin-top:5px\">{{ g.def }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = {\n    idx: 0, playing: false, glossary: false,\n    quiz: { q1: null, q2: null, q3: null },\n    scaleMode: 'horizontal', load: 2, lb: 'alb', cap: 'ap',\n    drops: { alb:null, nlb:null, gwlb:null, http:null, tcp:null, firewall:null },\n    sel: null, dragChecked: false,\n  };\n\n  total = 16;\n  interactive = new Set([2,4,5,7,9,11,12,14]);\n  durations = { 0:5200 };\n\n  // ASG bounds\n  asgMin = 1; asgMax = 4; asgDesired = 2;\n\n  chapTitles = ['Welcome','The elastic cloud','Vertical vs Horizontal','Elasticity','Quick check','Auto Scaling sim','Min / Desired / Max','ASG components','Quick check','Multi-AZ & health','Load balancing','Types of ELB','CAP theorem','CloudWatch & build','Final check','Wrap-up'];\n  chapColors = ['#ec7211','#3d6ef5','#8a5cf6','#19c39a','#ffb43d','#ec7211','#ec7211','#8a5cf6','#ffb43d','#19c39a','#3d6ef5','#3d6ef5','#ff6b5e','#ec7211','#ffb43d','#3d6ef5'];\n\n  scaleData = {\n    vertical:{name:'Vertical scaling',sub:'Scale up / down',color:'#8a5cf6',icon:'\\u2195\\ufe0f',\n      desc:'Keep the same number of VMs, but give each one more resources \\u2014 migrate to a more powerful server, or increase its share of CPU time.',\n      pros:['Simple \\u2014 no app changes','Good for stateful workloads'],\n      cons:['A hard ceiling: one machine\\u2019s max','Usually needs a reboot','A single point of failure remains'],\n      viz:'one-big'},\n    horizontal:{name:'Horizontal scaling',sub:'Scale out / in',color:'#19c39a',icon:'\\u2194\\ufe0f',\n      desc:'Change the number of VMs \\u2014 add more as load rises, remove them as it falls. The most common cloud strategy.',\n      pros:['Near-limitless scale','No single point of failure','Pay only for what you run'],\n      cons:['Uses more network bandwidth','Needs a load balancer across the VMs'],\n      viz:'many-small'},\n  };\n\n  lbData = {\n    alb:{name:'Application Load Balancer',short:'ALB',color:'#8c4fff',layer:'Layer 7',icon:'\\ud83d\\udc26',\n      routes:'Routes HTTP / HTTPS requests \\u2014 can route by URL path or host name.',\n      best:'Web apps & microservices',note:'Requires at least two Availability Zones.'},\n    nlb:{name:'Network Load Balancer',short:'NLB',color:'#3d6ef5',layer:'Layer 4',icon:'\\u26a1',\n      routes:'Routes by IP address \\u2014 ideal for TCP and UDP traffic at very high throughput.',\n      best:'Extreme performance, low latency',note:'Handles millions of requests/sec.'},\n    gwlb:{name:'Gateway Load Balancer',short:'GWLB',color:'#19c39a',layer:'Layer 3/4',icon:'\\ud83d\\udee1\\ufe0f',\n      routes:'Routes traffic to third-party virtual appliances \\u2014 firewalls, IDS/IPS, deep packet inspection.',\n      best:'Inserting security appliances',note:'Scales appliances transparently.'},\n    classic:{name:'Classic Load Balancer',short:'CLB',color:'#8a90a8',layer:'Legacy',icon:'\\ud83d\\udd70\\ufe0f',\n      routes:'Routes traffic in the older EC2-Classic flat network shared with other customers.',\n      best:'Legacy apps only',note:'Superseded by ALB / NLB.'},\n  };\n  lbOrder = ['alb','nlb','gwlb','classic'];\n\n  capData = {\n    ap:{combo:'AP',has:['availability','partition'],lost:'consistency',color:'#19c39a',\n      title:'Availability + Partition tolerance',\n      desc:'All nodes stay available during a partition, but some may return an older version of the data until things reconcile.',\n      example:'DynamoDB, Cassandra \\u2014 \\u201calways answer, even if slightly stale\\u201d.'},\n    cp:{combo:'CP',has:['consistency','partition'],lost:'availability',color:'#3d6ef5',\n      title:'Consistency + Partition tolerance',\n      desc:'During a partition the system shuts the affected nodes down rather than return stale data \\u2014 so it may become unavailable.',\n      example:'HBase, MongoDB (default) \\u2014 \\u201ccorrect or nothing\\u201d.'},\n    ca:{combo:'CA',has:['consistency','availability'],lost:'partition',color:'#ff6b5e',\n      title:'Consistency + Availability',\n      desc:'Consistent and available \\u2014 but only with no partitions. In a real distributed network partitions happen, so true CA isn\\u2019t achievable.',\n      example:'A single-node relational DB \\u2014 fine until the network splits.'},\n  };\n  capNodes = {consistency:{label:'Consistency',icon:'\\ud83c\\udfaf'},availability:{label:'Availability',icon:'\\u2705'},partition:{label:'Partition tolerance',icon:'\\ud83d\\udd17'}};\n\n  dragMeta = {\n    http:{label:'HTTP path-based routing',cat:'alb'},\n    alb:{label:'Web apps & microservices',cat:'alb'},\n    tcp:{label:'Millions of TCP requests/sec',cat:'nlb'},\n    nlb:{label:'Ultra-low latency by IP',cat:'nlb'},\n    firewall:{label:'Insert a 3rd-party firewall',cat:'gwlb'},\n    gwlb:{label:'Route to virtual appliances',cat:'gwlb'},\n  };\n  dragOrder = ['http','alb','tcp','nlb','firewall','gwlb'];\n\n  quizDefs = {\n    q1:{question:'Your app adds more EC2 instances when traffic rises and removes them when it falls. Which scaling strategy is this?',\n      options:[{label:'Vertical scaling (scale up)'},{label:'Horizontal scaling (scale out)',correct:true},{label:'Diagonal scaling'},{label:'Manual provisioning'}],\n      explanation:'Changing the number of instances is horizontal scaling (scale out / in) \\u2014 the most common cloud strategy. Vertical scaling instead changes the size of each instance.'},\n    q2:{question:'An Auto Scaling group has min = 1, desired = 2, max = 4. Traffic is quiet overnight. How many instances will it settle at?',\n      options:[{label:'0'},{label:'1'},{label:'2 \\u2014 the desired capacity',correct:true},{label:'4'}],\n      explanation:'Absent a scaling policy firing, the group holds the desired capacity (2). It never drops below min (1) nor rises above max (4); scaling policies move desired within those bounds.'},\n    q3:{question:'The CAP theorem says a distributed system can guarantee at most two of three properties. Which three?',\n      options:[{label:'Cost, Agility, Performance'},{label:'Consistency, Availability, Partition tolerance',correct:true},{label:'Compute, Avail. Zones, Provisioning'},{label:'Caching, Auth, Persistence'}],\n      explanation:'CAP = Consistency, Availability, Partition tolerance. Since network partitions are unavoidable in practice, real systems choose between AP and CP.'},\n  };\n\n  glossary = [\n    {icon:'\\u2195\\ufe0f',term:'Vertical scaling',def:'Adding more resources (CPU/RAM) to existing VMs \\u2014 \\u201cscaling up\\u201d. Same count, bigger machines.'},\n    {icon:'\\u2194\\ufe0f',term:'Horizontal scaling',def:'Adding or removing VMs \\u2014 \\u201cscaling out / in\\u201d. The most common cloud strategy.'},\n    {icon:'\\ud83e\\udd38',term:'Elasticity',def:'Automatically increasing capacity as demand rises AND reducing it when demand falls.'},\n    {icon:'\\ud83d\\udcc8',term:'EC2 Auto Scaling',def:'AWS service that keeps the right number of EC2 instances running for your load.'},\n    {icon:'\\ud83d\\udce6',term:'Auto Scaling group (ASG)',def:'A managed collection of EC2 instances treated as one unit, with min / desired / max sizes.'},\n    {icon:'\\ud83d\\udccf',term:'Desired capacity',def:'The number of instances the ASG aims to run; scaling policies adjust it between min and max.'},\n    {icon:'\\u2197\\ufe0f',term:'Scale out / in',def:'Scaling out = add instances; scaling in = remove instances. (Out/in, not up/down.)'},\n    {icon:'\\ud83d\\udcdc',term:'Launch template',def:'A reusable, versioned config (AMI, instance type, key pair, security groups) used to launch instances.'},\n    {icon:'\\ud83c\\udfe5',term:'Health check',def:'A test of instance health; ASG terminates unhealthy instances and launches replacements.'},\n    {icon:'\\ud83c\\udfd7\\ufe0f',term:'Availability Zone',def:'An isolated data-center cluster. ASG spreads instances across AZs for resilience.'},\n    {icon:'\\u2696\\ufe0f',term:'Elastic Load Balancing',def:'Distributes incoming traffic across healthy targets in one or more AZs.'},\n    {icon:'\\ud83d\\udc26',term:'ALB',def:'Application Load Balancer \\u2014 Layer 7, routes HTTP/HTTPS by path or host.'},\n    {icon:'\\u26a1',term:'NLB',def:'Network Load Balancer \\u2014 Layer 4, routes TCP/UDP by IP at very high throughput.'},\n    {icon:'\\ud83e\\udde9',term:'CAP theorem',def:'A distributed system can guarantee at most two of Consistency, Availability, Partition tolerance.'},\n    {icon:'\\ud83d\\udcca',term:'CloudWatch',def:'AWS monitoring service \\u2014 metrics & alarms that trigger Auto Scaling policies.'},\n    {icon:'\\ud83c\\udf31',term:'Elastic Beanstalk',def:'A managed service that provisions and runs your app from just your code.'},\n  ];\n\n  componentDidMount(){}\n  componentWillUnmount(){ window.removeEventListener('keydown', this.onKey); clearTimeout(this.t); }\n  ensureWiring(){\n    if(!this._kb){ this._kb=true; window.addEventListener('keydown', this.onKey); }\n    if(this._lastIdx!==this.state.idx || this._lastPlay!==this.state.playing){\n      this._lastIdx=this.state.idx; this._lastPlay=this.state.playing; this.scheduleAutoplay();\n    }\n  }\n  onKey = (e)=>{\n    const tag=(e.target&&e.target.tagName)||'';\n    if(tag==='INPUT'||tag==='TEXTAREA') return;\n    if(e.key==='ArrowRight'){ this.next(); }\n    else if(e.key==='ArrowLeft'){ this.prev(); }\n    else if(e.key===' '){ e.preventDefault(); this.togglePlay(); }\n  };\n\n  sceneCfg = [\n    {gap:22,center:true,pos:true},{gap:24},{gap:18},{gap:20},{gap:22,vcenter:true},\n    {gap:16},{gap:18},{gap:18},{gap:22,vcenter:true},{gap:18},\n    {gap:18},{gap:16},{gap:16},{gap:16},{gap:22,vcenter:true},{gap:22},\n  ];\n  sceneStyle(k){\n    const c=this.sceneCfg[k]; const on=this.state.idx===k;\n    const s={display:on?'flex':'none',flexDirection:'column',minHeight:'560px',gap:c.gap+'px',width:'100%'};\n    if(c.center){ s.alignItems='center'; s.justifyContent='center'; s.textAlign='center'; }\n    if(c.vcenter){ s.justifyContent='center'; }\n    if(c.pos){ s.position='relative'; }\n    return s;\n  }\n\n  scheduleAutoplay(){\n    clearTimeout(this.t);\n    const i=this.state.idx;\n    if(this.state.playing && !this.interactive.has(i) && i<this.total-1){\n      this.t=setTimeout(()=>this.next(), this.durations[i]||9000);\n    }\n  }\n\n  next=()=> this.setState(s=> s.idx<this.total-1 ? {idx:s.idx+1} : {playing:false});\n  prev=()=> this.setState(s=> ({idx:Math.max(0,s.idx-1)}));\n  goTo=(i)=>()=> this.setState({idx:i});\n  togglePlay=()=> this.setState(s=>({playing:!s.playing}));\n  startLesson=()=> this.setState({idx:1});\n  playFromStart=()=> this.setState({idx:1, playing:true});\n  toggleGlossary=()=> this.setState(s=>({glossary:!s.glossary}));\n\n  answer=(q,i)=> this.setState(s=> s.quiz[q]!=null ? null : ({quiz:{...s.quiz,[q]:i}}));\n  setScaleMode=(m)=>()=> this.setState({scaleMode:m});\n  setLoad=(e)=> this.setState({load: +e.target.value});\n  setLb=(l)=>()=> this.setState({lb:l});\n  setCap=(c)=>()=> this.setState({cap:c});\n\n  pick=(id)=>()=> this.setState(s=>({sel: s.sel===id?null:id}));\n  drop=(b)=>()=> this.setState(s=>{ if(!s.sel) return null; return {drops:{...s.drops,[s.sel]:b}, sel:null}; });\n  toTray=(id)=>()=> this.setState(s=>({drops:{...s.drops,[id]:null}, sel:null}));\n  checkDrag=()=> this.setState({dragChecked:true, sel:null});\n  resetDrag=()=> this.setState({drops:{alb:null,nlb:null,gwlb:null,http:null,tcp:null,firewall:null}, dragChecked:false, sel:null});\n\n  buildQuiz(qKey){\n    const def=this.quizDefs[qKey]; const sel=this.state.quiz[qKey];\n    const options=def.options.map((o,i)=>{\n      let bg='#fff',fg='#22243f',border='#e4e8f5',mark='';\n      if(sel!=null){\n        if(o.correct){ bg='#e7f9f1';fg='#0c7a52';border='#19c39a';mark='\\u2713'; }\n        else if(i===sel){ bg='#fdeceb';fg='#c2362b';border='#ff6b5e';mark='\\u2717'; }\n        else { fg='#9aa0b8';border='#eef1f8'; }\n      }\n      return {label:o.label,bg,fg,border,mark,onClick:()=>this.answer(qKey,i)};\n    });\n    const answered=sel!=null;\n    const isCorrect=answered && def.options[sel].correct;\n    return {question:def.question,options,answered,isCorrect,explanation:def.explanation,\n      banner: !answered ? '' : (isCorrect?'\\u2705 Correct!':'\\u274c Not quite \\u2014'),\n      bannerBg: !answered ? '' : (isCorrect?'#e7f9f1':'#fdeceb'),\n      bannerFg: !answered ? '' : (isCorrect?'#0c7a52':'#c2362b')};\n  }\n\n  buildDragItem(id, place){\n    const m=this.dragMeta[id]; const drops=this.state.drops; const checked=this.state.dragChecked;\n    const selected=this.state.sel===id;\n    let bg='#fff',fg='#22243f',border='#dde4f5',mark='';\n    if(checked && place!=='tray'){\n      const ok=drops[id]===m.cat;\n      bg=ok?'#e7f9f1':'#fdeceb'; fg=ok?'#0c7a52':'#c2362b'; border=ok?'#19c39a':'#ff6b5e'; mark=ok?'\\u2713':'\\u2717';\n    } else if(selected){ bg='#fff1ec'; border='#ec7211'; }\n    const onClick = place==='tray' ? this.pick(id) : this.toTray(id);\n    return {id,label:m.label,bg,fg,border,mark,selected,onClick};\n  }\n\n  renderVals(){\n    this.ensureWiring();\n    const i=this.state.idx;\n    const accent=this.chapColors[i]||'#ec7211';\n    const sc={}; for(let k=0;k<this.total;k++) sc['sc'+k]=this.sceneStyle(k);\n    const chapters=this.chapTitles.map((t,k)=>({num:k+1,label:t,onClick:this.goTo(k),bg: k===i?this.chapColors[k] : (k<i?'#aab6dd':'#dbe2f4')}));\n\n    // scaling mode\n    const sm=this.scaleData[this.state.scaleMode];\n    const scaleTabs=Object.keys(this.scaleData).map(k=>({key:k,label:this.scaleData[k].name,icon:this.scaleData[k].icon,active:this.state.scaleMode===k,onClick:this.setScaleMode(k),bg:this.state.scaleMode===k?this.scaleData[k].color:'#f4f6fc',fg:this.state.scaleMode===k?'#fff':'#3a3f5c'}));\n    const scaleInfo={...sm, pros:sm.pros.map(t=>({t})), cons:sm.cons.map(t=>({t})),\n      vBig:sm.viz==='one-big', vMany:sm.viz==='many-small'};\n\n    // ASG simulator\n    const load=this.state.load; // 0..5\n    let count = Math.min(this.asgMax, Math.max(this.asgMin, Math.round(this.asgMin + load/5*(this.asgMax-this.asgMin))));\n    // distribute across 2 AZs\n    const azA=Math.ceil(count/2), azB=count-Math.ceil(count/2);\n    const mkInst=(n,az)=>Array.from({length:n},(_,k)=>({key:az+'-'+k}));\n    const loadPct=Math.round(load/5*100);\n    let loadLabel='Idle', loadColor='#19c39a';\n    if(load>=4){ loadLabel='Peak traffic'; loadColor='#e0564a'; }\n    else if(load>=2){ loadLabel='Busy'; loadColor='#ec7211'; }\n    else if(load>=1){ loadLabel='Light'; loadColor='#d98a18'; }\n    const action = count>this.asgDesired ? 'Scaling OUT \\u2192 adding instances' : (count<this.asgDesired? 'Scaling IN \\u2192 removing instances' : 'At desired capacity');\n    const asg={count, azA:mkInst(azA,'a'), azB:mkInst(azB,'b'), azAn:azA, azBn:azB,\n      loadPct:loadPct+'%', loadLabel, loadColor, action,\n      atMax:count===this.asgMax, atMin:count===this.asgMin, load};\n\n    // LB\n    const ld=this.lbData[this.state.lb];\n    const lbTabs=this.lbOrder.map(k=>({key:k,label:this.lbData[k].short,active:this.state.lb===k,onClick:this.setLb(k),bg:this.state.lb===k?this.lbData[k].color:'#f4f6fc',fg:this.state.lb===k?'#fff':'#3a3f5c'}));\n\n    // CAP\n    const cd=this.capData[this.state.cap];\n    const capTabs=Object.keys(this.capData).map(k=>({key:k,label:this.capData[k].combo,active:this.state.cap===k,onClick:this.setCap(k),bg:this.state.cap===k?this.capData[k].color:'#f4f6fc',fg:this.state.cap===k?'#fff':'#3a3f5c'}));\n    const capTriangle=['consistency','availability','partition'].map(n=>{\n      const active=cd.has.includes(n);\n      return {label:this.capNodes[n].label, icon:this.capNodes[n].icon, active,\n        bg:active?cd.color:'#f1f0f4', fg:active?'#fff':'#b0b3c4', border:active?cd.color:'#e7ecfa'};\n    });\n    const capInfo={...cd, triangle:capTriangle, lostLabel:this.capNodes[cd.lost].label};\n\n    // drag\n    const tray=this.dragOrder.filter(id=>this.state.drops[id]==null).map(id=>this.buildDragItem(id,'tray'));\n    const bucket=(b)=>this.dragOrder.filter(id=>this.state.drops[id]===b).map(id=>this.buildDragItem(id,b));\n    const correct=this.dragOrder.filter(id=>this.state.drops[id]===this.dragMeta[id].cat).length;\n\n    return {\n      ...sc,\n      progressPct: Math.round(i/(this.total-1)*100)+'%',\n      accent, sceneNum:i+1, total:this.total, sceneTitle:this.chapTitles[i], chapters,\n      next:this.next, prev:this.prev, togglePlay:this.togglePlay,\n      playLabel: this.state.playing?'\\u23f8 Pause':'\\u25b6 Play',\n      startLesson:this.startLesson, playFromStart:this.playFromStart,\n      glossaryOpen:this.state.glossary, toggleGlossary:this.toggleGlossary, glossary:this.glossary,\n      scaleTabs, scaleInfo,\n      asg, setLoad:this.setLoad,\n      lbTabs, lbInfo:ld,\n      capTabs, capInfo,\n      q1:this.buildQuiz('q1'), q2:this.buildQuiz('q2'), q3:this.buildQuiz('q3'),\n      dragTray:tray, dragAlb:bucket('alb'), dragNlb:bucket('nlb'), dragGwlb:bucket('gwlb'),\n      dropAlb:this.drop('alb'), dropNlb:this.drop('nlb'), dropGwlb:this.drop('gwlb'),\n      checkDrag:this.checkDrag, resetDrag:this.resetDrag, dragChecked:this.state.dragChecked,\n      dragScore:correct+' / 6 correct', dragScoreBg: correct===6?'#e7f9f1':'#fff4e8', dragScoreFg: correct===6?'#0c7a52':'#d98a18',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
